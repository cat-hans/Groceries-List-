<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🛒 הסל שלנו</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDug3fqhFWzZVE_tTw1ee1RFOdsARlRqNc",
  authDomain: "grocery-list-dbbdd.firebaseapp.com",
  databaseURL: "https://grocery-list-dbbdd-default-rtdb.firebaseio.com",
  projectId: "grocery-list-dbbdd",
  storageBucket: "grocery-list-dbbdd.firebasestorage.app",
  messagingSenderId: "1079059037973",
  appId: "1:1079059037973:web:0d281a9fcea0b227f6b31c"
};

function getWeekKey(date = new Date()) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay());
  return `week_${d.getFullYear()}_${String(d.getMonth()+1).padStart(2,'0')}_${String(d.getDate()).padStart(2,'0')}`;
}
function getWeekLabel(key) {
  const parts = key.replace('week_','').split('_');
  const d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  const end = new Date(d); end.setDate(d.getDate()+6);
  const fmt = dt => `${dt.getDate()}/${dt.getMonth()+1}/${dt.getFullYear()}`;
  return `${fmt(d)} – ${fmt(end)}`;
}

// ── DRAG MANAGER (ghost strategy — nothing else moves) ──
const DRAG = {
  el: null, ghost: null, spacer: null, startY: 0,
  start(el, y) {
    const rect = el.getBoundingClientRect();
    this.el = el; this.startY = y;
    this.spacer = document.createElement('div');
    this.spacer.style.cssText = `height:${rect.height}px;margin-bottom:8px;flex-shrink:0;`;
    el.after(this.spacer);
    el.style.visibility = 'hidden';
    this.ghost = el.cloneNode(true);
    this.ghost.style.cssText = `position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;z-index:999;pointer-events:none;opacity:0.93;box-shadow:0 12px 40px rgba(0,0,0,0.7);border-radius:16px;`;
    document.body.appendChild(this.ghost);
    document.body.style.overflow = 'hidden';
  },
  move(y) {
    if (!this.el) return;
    const dy = y - this.startY; this.startY = y;
    const top = parseFloat(this.ghost.style.top) + dy;
    this.ghost.style.top = top + 'px';
    const midY = top + this.ghost.offsetHeight / 2;
    const list = document.getElementById('items-list');
    const wraps = [...list.querySelectorAll('.item-wrap')].filter(w => w !== this.el);
    let placed = false;
    for (const sib of wraps) {
      const r = sib.getBoundingClientRect();
      if (midY < r.top + r.height / 2) { list.insertBefore(this.spacer, sib); placed = true; break; }
    }
    if (!placed) list.appendChild(this.spacer);
  },
  async end() {
    if (!this.el) return;
    this.spacer.replaceWith(this.el);
    this.el.style.visibility = '';
    this.ghost.remove();
    document.body.style.overflow = '';
    const wk = APP.currentWeek;
    [...document.querySelectorAll('#items-list .item-wrap')].forEach((w,i) => {
      const id = w.dataset.id;
      if (APP.items[wk]?.[id]) APP.items[wk][id].sortOrder = i * 1000;
    });
    this.el = null; this.ghost = null; this.spacer = null;
    await APP.saveData();
  }
};
document.addEventListener('touchmove', e => { if (DRAG.el) { e.preventDefault(); DRAG.move(e.touches[0].clientY); } }, { passive: false });
document.addEventListener('touchend', () => { if (DRAG.el) DRAG.end(); });
document.addEventListener('mousemove', e => { if (DRAG.el) DRAG.move(e.clientY); });
document.addEventListener('mouseup', () => { if (DRAG.el) DRAG.end(); });

// ── VOICE SHOPPING MODE ──
const SHOP = {
  active: false,
  items: [],
  idx: 0,
  rec: null,

  speak(text) {
    return new Promise(resolve => {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'he-IL'; u.rate = 0.95;
      u.onend = resolve;
      window.speechSynthesis.speak(u);
    });
  },

  async start() {
    const wk = APP.currentWeek;
    this.items = Object.values(APP.items[wk] || {})
      .filter(i => !i.done)
      .sort((a,b) => (a.sortOrder||a.addedAt) - (b.sortOrder||b.addedAt));
    if (!this.items.length) { APP.showToast('אין פריטים ברשימה'); return; }
    this.active = true; this.idx = 0;
    document.getElementById('shop-mode-bar').style.display = 'flex';
    await this.readCurrent();
  },

  async readCurrent() {
    if (this.idx >= this.items.length) {
      await this.speak('סיימנו! כל הכבוד!');
      this.stop(); return;
    }
    const item = this.items[this.idx];
    const qty = item.qty > 1 ? `, כמות ${item.qty}` : '';
    document.getElementById('shop-current').textContent = item.name + (item.qty > 1 ? ` ×${item.qty}` : '');
    await this.speak(`${item.name}${qty}`);
    if (this.active) this.listen();
  },

  listen() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    this.rec = new SR();
    this.rec.lang = 'he-IL'; this.rec.interimResults = false;
    this.rec.onresult = async e => {
      const said = e.results[0][0].transcript.trim();
      if (/לקחתי|לקחנו|יש|אחד|אישור|כן|יאללה/.test(said)) {
        await APP.toggleDone(APP.currentWeek, this.items[this.idx].id);
        this.idx++;
        await this.readCurrent();
      } else if (/דלג|הבא|אין|לא/.test(said)) {
        this.idx++;
        await this.readCurrent();
      } else {
        await this.speak('לא הבנתי. אמור לקחתי כדי להמשיך.');
        if (this.active) this.listen();
      }
    };
    this.rec.onerror = () => { if (this.active) this.listen(); };
    this.rec.start();
  },

  stop() {
    this.active = false;
    window.speechSynthesis.cancel();
    if (this.rec) { try { this.rec.stop(); } catch(e){} this.rec = null; }
    document.getElementById('shop-mode-bar').style.display = 'none';
  }
};

// ── APP ──
window.APP = {
  db: null, currentWeek: null, items: {}, stats: {},

  async init() {
    this.currentWeek = getWeekKey();
    try {
      const app = initializeApp(firebaseConfig);
      this.db = getDatabase(app);
      onValue(ref(this.db, '/'), snap => {
        const d = snap.val() || {};
        this.items = d.items || {}; this.stats = d.stats || {};
        this.saveLocal(); this.renderList(); this.renderWeekSelector(); this.renderStats(); this.checkSmartSuggestions();
      });
      document.getElementById('sync-badge').textContent = '☁️ מסונכרן';
      document.getElementById('sync-badge').className = 'sync-badge online';
    } catch(e) {
      this.loadLocal();
      document.getElementById('sync-badge').textContent = '💾 מקומי';
      document.getElementById('sync-badge').className = 'sync-badge offline';
    }
    this.renderWeekSelector();
  },

  loadLocal() {
    try { const d = JSON.parse(localStorage.getItem('hasal_data')||'{}'); this.items=d.items||{}; this.stats=d.stats||{}; } catch(e){}
    this.renderList(); this.renderStats(); this.checkSmartSuggestions();
  },
  saveLocal() { localStorage.setItem('hasal_data', JSON.stringify({items:this.items,stats:this.stats})); },

  async saveData() {
    if (this.db) { await set(ref(this.db,'/'), {items:this.items,stats:this.stats}); }
    else { this.saveLocal(); this.renderList(); this.renderStats(); this.checkSmartSuggestions(); }
  },

  async addItem(name, imageData=null, qty=1, weekKey=null) {
    if (!name.trim()) return;
    const wk = weekKey || this.currentWeek;
    if (!this.items[wk]) this.items[wk] = {};
    const id = 'item_'+Date.now()+'_'+Math.random().toString(36).slice(2,5);
    const maxOrder = Math.max(0, ...Object.values(this.items[wk]).map(i=>i.sortOrder||0));
    this.items[wk][id] = { id, name:name.trim(), qty:qty||1, done:false, price:null, image:imageData||null, addedAt:Date.now(), sortOrder:maxOrder+1000, autoAdded:false };
    const key = name.trim().toLowerCase();
    if (!this.stats[key]) this.stats[key]={count:0,weeks:[],lastAdded:null};
    if (!this.stats[key].weeks.includes(wk)) this.stats[key].weeks.push(wk);
    this.stats[key].count++; this.stats[key].lastAdded=Date.now();
    await this.saveData();
    document.getElementById('item-input').value='';
    document.getElementById('qty-input').value='';
    document.getElementById('image-preview').style.display='none';
    window._pendingImage=null;
  },

  async toggleDone(weekKey, id) {
    const item = this.items[weekKey]?.[id]; if(!item) return;
    item.done = !item.done;
    await this.saveData();
  },

  async setPrice(weekKey, id, price) {
    if (this.items[weekKey]?.[id]) { this.items[weekKey][id].price=parseFloat(price)||null; await this.saveData(); }
  },

  async updateName(weekKey, id, newName) {
    if (this.items[weekKey]?.[id] && newName.trim()) {
      this.items[weekKey][id].name = newName.trim();
      await this.saveData();
    }
  },

  async moveToNextWeek(weekKey, id) {
    const item = this.items[weekKey]?.[id]; if(!item) return;
    const d=new Date(); const next=getWeekKey(new Date(d.setDate(d.getDate()+7)));
    if(!this.items[next]) this.items[next]={};
    const newId='item_'+Date.now();
    this.items[next][newId]={...item,id:newId,done:false,price:null,addedAt:Date.now(),sortOrder:Date.now()};
    delete this.items[weekKey][id];
    await this.saveData(); this.showToast('📅 הועבר לשבוע הבא!');
  },

  async deleteItem(weekKey, id) {
    if(this.items[weekKey]?.[id]){ delete this.items[weekKey][id]; await this.saveData(); }
  },

  renderList() {
    const wk = this.currentWeek;
    const items = this.items[wk]||{};
    document.getElementById('week-label').textContent = getWeekLabel(wk);
    const arr = Object.values(items).sort((a,b)=>(a.sortOrder||a.addedAt)-(b.sortOrder||b.addedAt));
    const pending = arr.filter(i=>!i.done), done = arr.filter(i=>i.done);
    const total = done.reduce((s,i)=>s+(i.price||0),0);
    document.getElementById('total-price').textContent = total>0?`סה״כ: ₪${total.toFixed(2)}`:'';
    document.getElementById('item-count').textContent = `${pending.length} פריטים`;
    const list = document.getElementById('items-list');
    list.innerHTML='';
    if(!arr.length){ list.innerHTML=`<div class="empty-state"><div class="empty-icon">🛒</div><p>הרשימה ריקה</p></div>`; return; }
    pending.forEach(item=>list.appendChild(this.createItemEl(wk,item)));
    if(done.length){ const d=document.createElement('div'); d.className='divider-label'; d.textContent=`✓ נלקח (${done.length})`; list.appendChild(d); done.forEach(item=>list.appendChild(this.createItemEl(wk,item))); }
  },

  createItemEl(weekKey, item) {
    const wrap = document.createElement('div');
    wrap.className='item-wrap'; wrap.dataset.id=item.id;
    const qty = item.qty>1?`<span class="qty-badge">×${item.qty}</span>`:'';
    const img = item.image?`<img src="${item.image}" class="item-thumb" onclick="event.stopPropagation();APP.showImage('${item.image}')">`:'';
    const auto = item.autoAdded?`<span class="auto-badge">🤖</span>`:'';
    wrap.innerHTML=`
      <div class="swipe-hint-left">📅 שבוע הבא</div>
      <div class="swipe-hint-right">🗑 מחיקה</div>
      <div class="item-card${item.done?' done':''}">
        <div class="drag-handle" data-nodrag="false">⠿</div>
        ${img}
        <div class="item-content" onclick="APP.toggleDone('${weekKey}','${item.id}')">
          <div class="item-top-row">
            <span class="item-name">${item.name}</span>
            ${qty}${auto}
          </div>
          ${item.done?'<span class="done-check">✓ נלקח</span>':''}
        </div>
        <div class="price-inline">
          <span class="price-sym">₪</span>
          <input type="number" class="price-input" placeholder="—" value="${item.price||''}"
            onclick="event.stopPropagation()"
            onchange="APP.setPrice('${weekKey}','${item.id}',this.value)"
            step="0.1" min="0">
        </div>
      </div>`;

    const card = wrap.querySelector('.item-card');
    const hintL = wrap.querySelector('.swipe-hint-left');
    const hintR = wrap.querySelector('.swipe-hint-right');
    let sx=0, draggingH=false;
    const threshold=80;

    // Swipe horizontal (skip if on drag handle)
    card.addEventListener('touchstart', e=>{
      if(e.target.closest('.drag-handle')||e.target.closest('.price-input')) return;
      sx=e.touches[0].clientX; draggingH=false;
      card.style.transition='none';
    },{passive:true});
    card.addEventListener('touchmove', e=>{
      if(e.target.closest('.drag-handle')) return;
      const dx=e.touches[0].clientX-sx;
      draggingH=true;
      card.style.transform=`translateX(${dx}px)`;
      hintL.style.opacity=dx<-20?Math.min(1,Math.abs(dx)/threshold):0;
      hintR.style.opacity=dx>20?Math.min(1,dx/threshold):0;
    },{passive:true});
    card.addEventListener('touchend', e=>{
      const dx=parseFloat(card.style.transform.replace('translateX(',''))||0;
      card.style.transition='transform 0.3s ease';
      hintL.style.opacity=0; hintR.style.opacity=0;
      if(dx<-threshold){ card.style.transform='translateX(-120%)'; setTimeout(()=>APP.moveToNextWeek(weekKey,item.id),250); }
      else if(dx>threshold){ card.style.transform='translateX(120%)'; setTimeout(()=>APP.deleteItem(weekKey,item.id),250); }
      else card.style.transform='translateX(0)';
    });

    // Double-tap to edit
    let lastTap = 0;
    card.addEventListener('touchend', e => {
      if (e.target.closest('.drag-handle') || e.target.closest('.price-input')) return;
      const now = Date.now();
      if (now - lastTap < 350) { APP.openEdit(weekKey, item.id); }
      lastTap = now;
    });
    card.addEventListener('dblclick', e => {
      if (e.target.closest('.drag-handle') || e.target.closest('.price-input')) return;
      APP.openEdit(weekKey, item.id);
    });

    // Drag vertical handle
    const handle = wrap.querySelector('.drag-handle');
    handle.addEventListener('touchstart', e=>{ e.stopPropagation(); DRAG.start(wrap, e.touches[0].clientY); },{passive:true});
    handle.addEventListener('mousedown', e=>{ e.stopPropagation(); DRAG.start(wrap, e.clientY); });

    return wrap;
  },

  openEdit(weekKey, id) {
    const item = this.items[weekKey]?.[id]; if(!item) return;
    const modal = document.getElementById('edit-modal');
    document.getElementById('edit-name-input').value = item.name;
    document.getElementById('edit-qty-input').value = item.qty||1;
    modal.dataset.week=weekKey; modal.dataset.id=id;
    modal.classList.add('active');
    document.getElementById('edit-name-input').focus();
  },

  async saveEdit() {
    const modal = document.getElementById('edit-modal');
    const name = document.getElementById('edit-name-input').value.trim();
    const qty = parseInt(document.getElementById('edit-qty-input').value)||1;
    const {week, id} = modal.dataset;
    if(this.items[week]?.[id] && name){
      this.items[week][id].name=name;
      this.items[week][id].qty=qty;
      await this.saveData();
    }
    modal.classList.remove('active');
  },

  showImage(src){
    document.getElementById('img-modal-img').src=src;
    document.getElementById('img-modal').classList.add('active');
  },

  renderWeekSelector(){
    const all=[...new Set([getWeekKey(), (() => { const d=new Date(); d.setDate(d.getDate()+7); return getWeekKey(d); })(), ...Object.keys(this.items)])].sort().reverse();
    const sel=document.getElementById('week-select');
    const cur=this.currentWeek;
    sel.innerHTML='';
    all.forEach(wk=>{ const o=document.createElement('option'); o.value=wk; o.textContent=getWeekLabel(wk); if(wk===cur)o.selected=true; sel.appendChild(o); });
  },

  switchWeek(wk){ this.currentWeek=wk; this.renderList(); this.checkSmartSuggestions(); },

  checkSmartSuggestions(){
    const wk=this.currentWeek;
    const curNames=Object.values(this.items[wk]||{}).map(i=>i.name.toLowerCase());
    const now=Date.now(); const sugg=[];
    Object.entries(this.stats).forEach(([name,stat])=>{
      if(stat.count<2||curNames.includes(name)) return;
      const avgWeeks=stat.weeks.length>1?(stat.weeks.length-1)/(stat.count-1):3;
      const daysSince=stat.lastAdded?(now-stat.lastAdded)/86400000:999;
      if(daysSince>=avgWeeks*7*0.8) sugg.push({name,days:Math.round(avgWeeks*7),since:Math.round(daysSince)});
    });
    const c=document.getElementById('suggestions');
    if(!sugg.length){c.style.display='none';return;}
    c.style.display='block';
    c.innerHTML=`<div class="sugg-title">🤖 הסל הזכור — הגיע הזמן:</div>`+
      sugg.slice(0,5).map(s=>`<div class="sugg-chip" onclick="APP.addItem('${s.name}');APP.showToast('✅ נוסף!')"><span>${s.name}</span><small>~כל ${s.days} יום</small><span class="chip-plus">+</span></div>`).join('');
    sugg.filter(s=>s.since>=s.days*2).forEach(s=>{
      const already=Object.values(this.items[wk]||{}).some(i=>i.name.toLowerCase()===s.name&&i.autoAdded);
      if(!already) this.addAutoItem(s.name,wk);
    });
  },

  async addAutoItem(name,wk){
    if(!this.items[wk]) this.items[wk]={};
    const id='auto_'+Date.now();
    const maxOrder=Math.max(0,...Object.values(this.items[wk]).map(i=>i.sortOrder||0));
    this.items[wk][id]={id,name,qty:1,done:false,price:null,image:null,addedAt:Date.now(),sortOrder:maxOrder+1000,autoAdded:true};
    await this.saveData(); this.showToast(`🤖 הסל הזכור הוסיף: ${name}`);
  },

  renderStats(){
    const c=document.getElementById('stats-content');
    const entries=Object.entries(this.stats).filter(([,s])=>s.count>=1)
      .map(([name,s])=>({name,count:s.count,avg:s.weeks.length>1?Math.round((s.weeks.length-1)/(s.count-1)*7):'?'}))
      .sort((a,b)=>b.count-a.count).slice(0,20);
    if(!entries.length){c.innerHTML='<p class="stats-empty">עדיין אין נתונים 📊</p>';return;}
    c.innerHTML=`<div class="stats-hdr"><span>מוצר</span><span>ממוצע קנייה</span><span>פעמים</span></div>`+
      entries.map(e=>`<div class="stat-row"><span class="stat-name">${e.name}</span><span class="stat-avg">${e.avg==='?'?'—':`כל ~${e.avg} ימים`}</span><span class="stat-cnt">${e.count}×</span></div>`).join('');
  },

  comparePrice(){
    const w1=parseFloat(document.getElementById('p1-weight').value);
    const p1=parseFloat(document.getElementById('p1-price').value);
    const w2=parseFloat(document.getElementById('p2-weight').value);
    const p2=parseFloat(document.getElementById('p2-price').value);
    if(!w1||!p1||!w2||!p2){this.showToast('⚠️ מלא את כל השדות');return;}
    const u1=p1/w1,u2=p2/w2;
    const res=document.getElementById('compare-result');
    if(u1<u2){const pct=(((u2-u1)/u2)*100).toFixed(1);res.innerHTML=`<div class="cmp-win">🏆 מוצר א׳ זול ב-<strong>${pct}%</strong></div><div class="cmp-det">₪${u1.toFixed(3)} ליח׳ לעומת ₪${u2.toFixed(3)} ליח׳</div>`;}
    else if(u2<u1){const pct=(((u1-u2)/u1)*100).toFixed(1);res.innerHTML=`<div class="cmp-win">🏆 מוצר ב׳ זול ב-<strong>${pct}%</strong></div><div class="cmp-det">₪${u2.toFixed(3)} ליח׳ לעומת ₪${u1.toFixed(3)} ליח׳</div>`;}
    else res.innerHTML=`<div class="cmp-win">🤝 זהים!</div>`;
  },

  startVoice(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){this.showToast('הדפדפן לא תומך בקלט קולי');return;}
    const rec=new SR(); rec.lang='he-IL'; rec.interimResults=false;
    const btn=document.getElementById('voice-btn');
    btn.classList.add('recording'); btn.textContent='🔴';
    rec.start();
    rec.onresult=e=>{
      let t=e.results[0][0].transcript.replace(/תוסיפי|הוסיפי|הוסף|תוסיף/gi,'').replace(/לרשימה|לרשימת הקניות/gi,'').trim();
      document.getElementById('item-input').value=t;
      this.showToast(`🎙️ שמעתי: ${t}`);
      btn.classList.remove('recording'); btn.textContent='🎙️';
    };
    rec.onerror=rec.onend=()=>{btn.classList.remove('recording');btn.textContent='🎙️';};
  },

  showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.className='toast active';
    setTimeout(()=>t.className='toast',2500);
  }
};

window.addEventListener('DOMContentLoaded',()=>window.APP.init());
</script>

<style>
:root{--bg:#0f1117;--surf:#1a1d27;--surf2:#22263a;--acc:#4ade80;--acc2:#38bdf8;--warn:#fb923c;--danger:#f87171;--txt:#f1f5f9;--txt2:#94a3b8;--bdr:#2d3249;--r:16px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Rubik',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl;}

/* HEADER */
.header{background:var(--surf);border-bottom:1px solid var(--bdr);padding:14px 16px 10px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.app-title{font-size:1.4rem;font-weight:900;}.app-title span{color:var(--acc);}
.sync-badge{font-size:0.7rem;padding:3px 8px;border-radius:20px;}
.sync-badge.online{background:rgba(74,222,128,0.15);color:var(--acc);}
.sync-badge.offline{background:rgba(148,163,184,0.15);color:var(--txt2);}
.week-bar{display:flex;align-items:center;gap:8px;}
#week-select{background:var(--surf2);color:var(--txt);border:1px solid var(--bdr);border-radius:8px;padding:6px 10px;font-family:inherit;font-size:0.8rem;flex:1;}
#week-label{font-size:0.72rem;color:var(--txt2);white-space:nowrap;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--bdr);background:var(--surf);}
.tab{flex:1;padding:11px;text-align:center;font-size:0.78rem;cursor:pointer;border-bottom:2px solid transparent;color:var(--txt2);font-weight:500;}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);}

/* SHOP MODE BAR */
.shop-bar{display:none;align-items:center;gap:10px;background:linear-gradient(135deg,#1a2e1a,#0f1f1f);border-bottom:2px solid var(--acc);padding:12px 16px;position:sticky;top:0;z-index:99;}
.shop-bar-text{flex:1;}
.shop-bar-label{font-size:0.7rem;color:var(--acc);font-weight:700;text-transform:uppercase;letter-spacing:1px;}
#shop-current{font-size:1.1rem;font-weight:700;margin-top:2px;}
.shop-stop-btn{background:var(--danger);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-family:inherit;font-weight:700;cursor:pointer;font-size:0.85rem;}

/* PANEL */
.panel{display:none;padding:14px;max-width:600px;margin:0 auto;}
.panel.active{display:block;}

/* ADD */
.add-bar{display:flex;gap:8px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:8px;align-items:center;margin-bottom:8px;}
.add-bar input[type=text]{flex:1;background:transparent;border:none;color:var(--txt);font-family:inherit;font-size:1rem;outline:none;}
.add-bar input::placeholder{color:var(--txt2);}
.icon-btn{background:none;border:none;cursor:pointer;font-size:1.2rem;padding:4px 6px;border-radius:8px;}
.add-main-btn{background:var(--acc);color:#000;border:none;cursor:pointer;border-radius:10px;padding:8px 14px;font-weight:700;font-size:0.9rem;font-family:inherit;white-space:nowrap;}
.qty-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.qty-bar label{font-size:0.78rem;color:var(--txt2);margin:0;}
.qty-bar input{background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);border-radius:8px;padding:5px 10px;font-family:inherit;font-size:0.9rem;width:60px;text-align:center;outline:none;}

/* SHOP BTN */
.shop-start-btn{width:100%;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#000;border:none;border-radius:var(--r);padding:13px;font-family:inherit;font-weight:900;font-size:1rem;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;}

/* SUGGESTIONS */
#suggestions{display:none;margin-bottom:12px;}
.sugg-title{font-size:0.75rem;color:var(--txt2);margin-bottom:8px;}
.sugg-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surf2);border:1px solid var(--bdr);border-radius:20px;padding:5px 10px;margin:3px;cursor:pointer;font-size:0.8rem;}
.chip-plus{background:var(--acc);color:#000;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.75rem;flex-shrink:0;}

/* LIST META */
.list-meta{display:flex;justify-content:space-between;margin-bottom:10px;}
#item-count{font-size:0.78rem;color:var(--txt2);}
#total-price{font-size:0.88rem;color:var(--acc);font-weight:700;}

/* ITEM */
.item-wrap{position:relative;margin-bottom:8px;overflow:hidden;border-radius:var(--r);}
.swipe-hint-left,.swipe-hint-right{position:absolute;top:0;bottom:0;display:flex;align-items:center;padding:0 18px;font-size:0.8rem;font-weight:700;opacity:0;pointer-events:none;z-index:0;border-radius:var(--r);}
.swipe-hint-left{right:0;background:linear-gradient(to left,rgba(56,189,248,0.35),transparent);color:var(--acc2);}
.swipe-hint-right{left:0;background:linear-gradient(to right,rgba(248,113,113,0.35),transparent);color:var(--danger);}
.item-card{position:relative;z-index:1;display:flex;align-items:center;gap:8px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 10px;user-select:none;animation:sIn 0.2s ease;}
@keyframes sIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.item-card.done{opacity:0.5;}
.drag-handle{font-size:1.1rem;color:var(--txt2);cursor:grab;padding:0 4px;flex-shrink:0;touch-action:none;letter-spacing:-1px;line-height:1;}
.drag-handle:active{cursor:grabbing;}
.item-thumb{width:40px;height:40px;object-fit:cover;border-radius:8px;flex-shrink:0;cursor:pointer;}
.item-content{flex:1;min-width:0;cursor:pointer;}
.item-top-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.item-name{font-size:0.95rem;font-weight:500;}
.item-card.done .item-name{text-decoration:line-through;color:var(--txt2);}
.done-check{font-size:0.72rem;color:var(--acc);font-weight:700;display:block;margin-top:2px;}
.qty-badge{background:var(--acc2);color:#000;border-radius:10px;padding:1px 7px;font-size:0.72rem;font-weight:700;flex-shrink:0;}
.auto-badge{font-size:0.8rem;}
.price-inline{display:flex;align-items:center;gap:2px;flex-shrink:0;}
.price-sym{font-size:0.72rem;color:var(--txt2);}
.price-input{width:54px;background:var(--surf2);border:1px solid var(--bdr);color:var(--acc);border-radius:8px;padding:4px 5px;font-family:inherit;font-size:0.8rem;font-weight:700;text-align:center;outline:none;}
.price-input:focus{border-color:var(--acc);}
.divider-label{font-size:0.75rem;color:var(--txt2);padding:8px 4px 4px;}
.empty-state{text-align:center;padding:40px 20px;color:var(--txt2);}
.empty-icon{font-size:3rem;margin-bottom:10px;}

/* IMAGE PREVIEW */
#image-preview{display:none;margin-bottom:10px;}
#image-preview img{width:70px;height:70px;object-fit:cover;border-radius:10px;border:2px solid var(--acc);}

/* STATS */
.stats-hdr{display:flex;gap:8px;font-size:0.7rem;color:var(--txt2);font-weight:700;padding-bottom:6px;border-bottom:1px solid var(--bdr);margin-bottom:8px;}
.stats-hdr span:first-child{flex:1;}
.stat-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(45,50,73,0.5);}
.stat-name{flex:1;font-size:0.85rem;}
.stat-avg{font-size:0.75rem;color:var(--txt2);min-width:90px;}
.stat-cnt{font-size:0.8rem;color:var(--acc);font-weight:700;min-width:30px;text-align:left;}
.stats-empty{color:var(--txt2);font-size:0.9rem;padding:20px 0;}

/* COMPARE */
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.cmp-col{background:var(--surf2);border-radius:12px;padding:14px;}
.cmp-col-title{font-size:0.75rem;color:var(--txt2);margin-bottom:10px;font-weight:700;}
.cmp-col input{width:100%;background:var(--surf);border:1px solid var(--bdr);color:var(--txt);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:0.9rem;margin-bottom:8px;direction:rtl;outline:none;}
.cmp-col input:focus{border-color:var(--acc2);}
.cmp-btn{width:100%;background:var(--acc2);color:#000;border:none;border-radius:10px;padding:11px;font-weight:700;font-size:0.95rem;cursor:pointer;font-family:inherit;margin-bottom:14px;}
.cmp-win{font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:6px;}
.cmp-det{font-size:0.8rem;color:var(--txt2);text-align:center;}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:20px;}
.modal-overlay.active{display:flex;}
.modal{background:var(--surf);border:1px solid var(--bdr);border-radius:20px;padding:22px;width:100%;max-width:340px;animation:pop 0.2s ease;}
@keyframes pop{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal h3{font-size:1rem;margin-bottom:14px;}
.modal input{width:100%;background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);border-radius:10px;padding:10px 14px;font-family:inherit;font-size:1rem;margin-bottom:10px;direction:rtl;outline:none;}
.modal input:focus{border-color:var(--acc);}
.modal-btns{display:flex;gap:8px;}
.btn-pri{flex:1;background:var(--acc);color:#000;border:none;border-radius:10px;padding:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-sec{flex:1;background:var(--surf2);color:var(--txt);border:1px solid var(--bdr);border-radius:10px;padding:11px;cursor:pointer;font-family:inherit;}
#img-modal-img{max-width:100%;max-height:70vh;object-fit:contain;border-radius:12px;display:block;margin:0 auto;}

/* VOICE */
#voice-btn.recording{animation:pulse 0.8s infinite;color:red;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

/* TOAST */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surf);border:1px solid var(--bdr);padding:10px 20px;border-radius:20px;font-size:0.88rem;opacity:0;transition:all 0.3s;z-index:2000;pointer-events:none;white-space:nowrap;}
.toast.active{opacity:1;transform:translateX(-50%) translateY(0);}

label{font-size:0.78rem;color:var(--txt2);display:block;margin-bottom:4px;}
@media(max-width:400px){.cmp-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">🛒 הסל <span>שלנו</span></div>
    <span id="sync-badge" class="sync-badge offline">טוען...</span>
  </div>
  <div class="week-bar">
    <select id="week-select" onchange="APP.switchWeek(this.value)"></select>
    <span id="week-label"></span>
  </div>
</div>

<!-- SHOP MODE BAR -->
<div id="shop-mode-bar" class="shop-bar">
  <div class="shop-bar-text">
    <div class="shop-bar-label">🎙️ מצב קניה פעיל</div>
    <div id="shop-current">...</div>
  </div>
  <button class="shop-stop-btn" onclick="SHOP.stop()">עצור</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('list',this)">🛒 רשימה</div>
  <div class="tab" onclick="switchTab('stats',this)">📊 סטטיסטיקות</div>
  <div class="tab" onclick="switchTab('compare',this)">⚖️ השוואה</div>
</div>

<!-- LIST -->
<div id="list-panel" class="panel active">

  <div id="image-preview">
    <img id="preview-img" src="" alt="">
    <button onclick="clearImage()" style="margin-top:4px;background:var(--danger);color:#fff;border:none;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:0.72rem">הסר</button>
  </div>

  <div class="add-bar">
    <button class="icon-btn" id="voice-btn" onclick="APP.startVoice()">🎙️</button>
    <input type="text" id="item-input" placeholder="מוצר חדש..." onkeydown="if(event.key==='Enter')doAdd()">
    <label class="icon-btn" style="cursor:pointer;margin:0">
      📷<input type="file" accept="image/*" style="display:none" onchange="handleImage(event)">
    </label>
    <button class="add-main-btn" onclick="doAdd()">הוסף</button>
  </div>
  <div class="qty-bar">
    <label style="margin:0">כמות:</label>
    <input type="number" id="qty-input" placeholder="1" min="1" max="99">
  </div>

  <button class="shop-start-btn" onclick="SHOP.start()">
    🎙️ התחל קניה קולית
  </button>

  <div id="suggestions"></div>
  <div class="list-meta">
    <span id="item-count"></span>
    <span id="total-price"></span>
  </div>
  <div id="items-list"></div>
</div>

<!-- STATS -->
<div id="stats-panel" class="panel">
  <p style="font-size:1rem;font-weight:700;margin-bottom:6px">📊 דפוסי הקנייה שלי</p>
  <p style="font-size:0.78rem;color:var(--txt2);margin-bottom:14px">הסל לומד מתי אתה קונה כל מוצר ומוסיף המלצות אוטומטיות</p>
  <div id="stats-content"></div>
</div>

<!-- COMPARE -->
<div id="compare-panel" class="panel">
  <p style="font-size:1rem;font-weight:700;margin-bottom:14px">⚖️ מה יותר משתלם?</p>
  <div class="cmp-grid">
    <div class="cmp-col">
      <div class="cmp-col-title">מוצר א׳</div>
      <label>משקל / נפח (גרם / מ״ל)</label>
      <input type="number" id="p1-weight" placeholder="500">
      <label>מחיר (₪)</label>
      <input type="number" id="p1-price" placeholder="12.90">
    </div>
    <div class="cmp-col">
      <div class="cmp-col-title">מוצר ב׳</div>
      <label>משקל / נפח</label>
      <input type="number" id="p2-weight" placeholder="1000">
      <label>מחיר (₪)</label>
      <input type="number" id="p2-price" placeholder="19.90">
    </div>
  </div>
  <button class="cmp-btn" onclick="APP.comparePrice()">השווה עכשיו 🔍</button>
  <div id="compare-result"></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal" onclick="if(event.target===this)this.classList.remove('active')">
  <div class="modal">
    <h3>✏️ עריכת מוצר</h3>
    <input type="text" id="edit-name-input" placeholder="שם מוצר" onkeydown="if(event.key==='Enter')APP.saveEdit()">
    <label>כמות</label>
    <input type="number" id="edit-qty-input" placeholder="1" min="1" max="99">
    <div class="modal-btns">
      <button class="btn-pri" onclick="APP.saveEdit()">שמור</button>
      <button class="btn-sec" onclick="document.getElementById('edit-modal').classList.remove('active')">ביטול</button>
    </div>
  </div>
</div>

<!-- IMAGE MODAL -->
<div class="modal-overlay" id="img-modal" onclick="this.classList.remove('active')">
  <div class="modal" style="background:transparent;border:none;max-width:90vw">
    <img id="img-modal-img" src="" alt="">
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
function switchTab(name,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(name+'-panel').classList.add('active');
  el.classList.add('active');
  if(name==='stats') APP.renderStats();
}
function doAdd(){
  const name=document.getElementById('item-input').value.trim();
  const qty=parseInt(document.getElementById('qty-input').value)||1;
  if(name) APP.addItem(name,window._pendingImage,qty);
}
function handleImage(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{ window._pendingImage=ev.target.result; document.getElementById('preview-img').src=ev.target.result; document.getElementById('image-preview').style.display='block'; };
  r.readAsDataURL(file);
}
function clearImage(){ window._pendingImage=null; document.getElementById('image-preview').style.display='none'; document.getElementById('preview-img').src=''; }
</script>
</body>
</html>
