function getWeekKey(date = new Date()) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay());
  return `week_${d.getFullYear()}_${String(d.getMonth()+1).padStart(2,'0')}_${String(d.getDate()).padStart(2,'0')}`;
}
function getWeekLabel(key) {
  const p = key.replace('week_','').split('_');
  const d = new Date(+p[0], +p[1]-1, +p[2]);
  const e = new Date(d); e.setDate(d.getDate()+6);
  const f = dt => `${dt.getDate()}/${dt.getMonth()+1}/${dt.getFullYear()}`;
  return `${f(d)} – ${f(e)}`;
}

// ════════════════════════════════════════
// DRAG — simple push-down/up, no jumping
// ════════════════════════════════════════
const DRAG = {
  active: false,
  dragEl: null,
  ghost: null,
  origIndex: 0,
  startY: 0,
  currentY: 0,

  getItems() {
    return [...document.querySelectorAll('#items-list .item-wrap[data-id]')];
  },

  start(el, clientY) {
    const items = this.getItems();
    this.origIndex = items.indexOf(el);
    if (this.origIndex === -1) return;

    this.active = true;
    this.dragEl = el;
    this.startY = clientY;
    this.currentY = clientY;

    // Visual: lift the element
    el.classList.add('is-dragging');
    document.body.style.overflow = 'hidden';
    document.body.style.userSelect = 'none';
  },

  move(clientY) {
    if (!this.active || !this.dragEl) return;
    const dy = clientY - this.currentY;
    this.currentY = clientY;

    const items = this.getItems().filter(i => i !== this.dragEl);
    const curIdx = this.getItems().indexOf(this.dragEl);

    // Moving down
    if (dy > 0 && curIdx < this.getItems().length - 1) {
      const next = this.getItems()[curIdx + 1];
      if (next) {
        const nextRect = next.getBoundingClientRect();
        const dragRect = this.dragEl.getBoundingClientRect();
        if (dragRect.bottom > nextRect.top + nextRect.height * 0.5) {
          next.after(this.dragEl);
        }
      }
    }
    // Moving up
    if (dy < 0 && curIdx > 0) {
      const prev = this.getItems()[curIdx - 1];
      if (prev) {
        const prevRect = prev.getBoundingClientRect();
        const dragRect = this.dragEl.getBoundingClientRect();
        if (dragRect.top < prevRect.bottom - prevRect.height * 0.5) {
          prev.before(this.dragEl);
        }
      }
    }

    // Move the element visually with transform
    const totalDy = clientY - this.startY;
    this.dragEl.style.transform = `translateY(${totalDy}px)`;
  },

  async end() {
    if (!this.active || !this.dragEl) return;
    this.active = false;

    // Snap back transform, element is already in new DOM position
    this.dragEl.style.transform = '';
    this.dragEl.classList.remove('is-dragging');
    document.body.style.overflow = '';
    document.body.style.userSelect = '';

    // Save new order
    const wk = APP.currentWeek;
    this.getItems().forEach((w, i) => {
      const id = w.dataset.id;
      if (APP.items[wk]?.[id]) APP.items[wk][id].sortOrder = i * 1000;
    });
    this.dragEl = null;
    await APP.saveData();
  }
};

document.addEventListener('touchmove', e => {
  if (DRAG.active) { e.preventDefault(); DRAG.move(e.touches[0].clientY); }
}, { passive: false });
document.addEventListener('touchend', () => { if (DRAG.active) DRAG.end(); });
document.addEventListener('mousemove', e => { if (DRAG.active) DRAG.move(e.clientY); });
document.addEventListener('mouseup', () => { if (DRAG.active) DRAG.end(); });

// ════════════════════════════════════════
// VOICE SHOPPING MODE
// ════════════════════════════════════════
window.SHOP = {
  active: false,
  items: [],
  idx: 0,
  rec: null,

  speak(text) {
    return new Promise(resolve => {
      window.speechSynthesis.cancel();
      const voices = window.speechSynthesis.getVoices();
      const heVoice = voices.find(v => v.lang.startsWith('he')) || null;
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'he-IL';
      u.rate = 0.92;
      if (heVoice) u.voice = heVoice;
      u.onend = resolve;
      u.onerror = resolve;
      window.speechSynthesis.speak(u);
    });
  },

  async start() {
    // Load voices (needed on iOS)
    if (!window.speechSynthesis) {
      APP.showToast('הדפדפן לא תומך בדיבור');
      return;
    }
    const wk = APP.currentWeek;
    this.items = Object.values(APP.items[wk] || {})
      .filter(i => !i.done)
      .sort((a,b) => (a.sortOrder||a.addedAt) - (b.sortOrder||b.addedAt));

    if (!this.items.length) { APP.showToast('אין פריטים ברשימה'); return; }

    this.active = true;
    this.idx = 0;
    document.getElementById('shop-mode-bar').style.display = 'flex';
    document.getElementById('shop-status').textContent = '🎙️ מאזין...';

    await this.readCurrent();
  },

  async readCurrent() {
    if (!this.active) return;
    if (this.idx >= this.items.length) {
      document.getElementById('shop-current').textContent = '✅ סיום!';
      document.getElementById('shop-status').textContent = '';
      await this.speak('סיימנו! כל הכבוד!');
      this.stop();
      return;
    }
    const item = this.items[this.idx];
    const label = item.name + (item.qty > 1 ? `, כמות ${item.qty}` : '');
    document.getElementById('shop-current').textContent = item.name + (item.qty > 1 ? ` ×${item.qty}` : '');
    document.getElementById('shop-status').textContent = '🔊 מקריא...';
    await this.speak(label);
    if (!this.active) return;
    document.getElementById('shop-status').textContent = '🎙️ אמור "לקחתי" או "דלג"';
    this.listen();
  },

  listen() {
    if (!this.active) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      APP.showToast('הדפדפן לא תומך בזיהוי קול');
      return;
    }
    if (this.rec) { try { this.rec.abort(); } catch(e){} }
    this.rec = new SR();
    this.rec.lang = 'he-IL';
    this.rec.interimResults = false;
    this.rec.maxAlternatives = 3;

    this.rec.onresult = async e => {
      const results = [...e.results[0]].map(r => r.transcript.trim());
      const said = results.join(' ');
      console.log('heard:', said);
      if (/לקחתי|לקחנו|יש|כן|אחד|אוקיי|אישור|יאללה|טוב|בסדר/.test(said)) {
        document.getElementById('shop-status').textContent = '✅ מסומן!';
        await APP.toggleDone(APP.currentWeek, this.items[this.idx].id);
        this.idx++;
        await this.readCurrent();
      } else if (/דלג|הבא|לא|אין|פסח/.test(said)) {
        this.idx++;
        await this.readCurrent();
      } else {
        await this.speak('לא הבנתי, אמור לקחתי');
        if (this.active) this.listen();
      }
    };
    this.rec.onerror = e => {
      console.log('rec error:', e.error);
      if (!this.active) return;
      if (e.error === 'no-speech') { this.listen(); return; }
      setTimeout(() => { if (this.active) this.listen(); }, 500);
    };
    this.rec.onend = () => {
      // If still active and no result handled, restart
    };
    try { this.rec.start(); } catch(e) { console.log(e); }
  },

  stop() {
    this.active = false;
    window.speechSynthesis.cancel();
    if (this.rec) { try { this.rec.abort(); } catch(e){} this.rec = null; }
    document.getElementById('shop-mode-bar').style.display = 'none';
  }
};

// ════════════════════════════════════════
// APP
// ════════════════════════════════════════
window.APP = {
  db: null, currentWeek: null, items: {}, stats: {},

  async init() {
    this.currentWeek = getWeekKey();
    try {
      const app = initializeApp(firebaseConfig);
      this.db = getDatabase(app);
      onValue(ref(this.db, '/'), snap => {
        const d = snap.val() || {};
        this.items = d.items || {};
        this.stats = d.stats || {};
        this.saveLocal();
        this.renderList();
        this.renderWeekSelector();
        this.renderStats();
        this.checkSmartSuggestions();
      });
      document.getElementById('sync-badge').textContent = '☁️ מסונכרן';
      document.getElementById('sync-badge').className = 'sync-badge online';
    } catch(e) {
      this.loadLocal();
      document.getElementById('sync-badge').textContent = '💾 מקומי';
      document.getElementById('sync-badge').className = 'sync-badge offline';
    }
    this.renderWeekSelector();
  },

  loadLocal() {
    try {
      const d = JSON.parse(localStorage.getItem('hasal_data')||'{}');
      this.items = d.items||{}; this.stats = d.stats||{};
    } catch(e){}
    this.renderList(); this.renderStats(); this.checkSmartSuggestions();
  },

  saveLocal() {
    localStorage.setItem('hasal_data', JSON.stringify({items:this.items, stats:this.stats}));
  },

  async saveData() {
    if (this.db) {
      await set(ref(this.db,'/'), {items:this.items, stats:this.stats});
    } else {
      this.saveLocal();
      this.renderList(); this.renderStats(); this.checkSmartSuggestions();
    }
  },

  async addItem(name, imageData=null, qty=1, weekKey=null) {
    if (!name.trim()) return;
    const wk = weekKey || this.currentWeek;
    if (!this.items[wk]) this.items[wk] = {};
    const id = 'item_'+Date.now()+'_'+Math.random().toString(36).slice(2,5);
    const vals = Object.values(this.items[wk]);
    const maxOrder = vals.length ? Math.max(...vals.map(i=>i.sortOrder||0)) : 0;
    this.items[wk][id] = {
      id, name:name.trim(), qty:qty||1,
      done:false, price:null, image:imageData||null,
      addedAt:Date.now(), sortOrder:maxOrder+1000, autoAdded:false
    };
    const key = name.trim().toLowerCase();
    if (!this.stats[key]) this.stats[key]={count:0,weeks:[],lastAdded:null};
    if (!this.stats[key].weeks.includes(wk)) this.stats[key].weeks.push(wk);
    this.stats[key].count++;
    this.stats[key].lastAdded = Date.now();
    await this.saveData();
    document.getElementById('item-input').value = '';
    document.getElementById('qty-input').value = '';
    document.getElementById('image-preview').style.display = 'none';
    window._pendingImage = null;
  },

  async toggleDone(weekKey, id) {
    const item = this.items[weekKey]?.[id];
    if (!item) return;
    item.done = !item.done;
    await this.saveData();
  },

  async setPrice(weekKey, id, price) {
    if (this.items[weekKey]?.[id]) {
      this.items[weekKey][id].price = parseFloat(price)||null;
      await this.saveData();
    }
  },

  async updateItem(weekKey, id, name, qty) {
    if (this.items[weekKey]?.[id] && name.trim()) {
      this.items[weekKey][id].name = name.trim();
      this.items[weekKey][id].qty = qty||1;
      await this.saveData();
    }
  },

  async moveToNextWeek(weekKey, id) {
    const item = this.items[weekKey]?.[id]; if (!item) return;
    const d = new Date(); d.setDate(d.getDate()+7);
    const next = getWeekKey(d);
    if (!this.items[next]) this.items[next] = {};
    const newId = 'item_'+Date.now();
    const vals = Object.values(this.items[next]);
    const maxOrder = vals.length ? Math.max(...vals.map(i=>i.sortOrder||0)) : 0;
    this.items[next][newId] = {...item, id:newId, done:false, price:null, addedAt:Date.now(), sortOrder:maxOrder+1000};
    delete this.items[weekKey][id];
    await this.saveData();
    this.showToast('📅 הועבר לשבוע הבא!');
  },

  async deleteItem(weekKey, id) {
    if (this.items[weekKey]?.[id]) {
      delete this.items[weekKey][id];
      await this.saveData();
    }
  },

  renderList() {
    const wk = this.currentWeek;
    const items = this.items[wk]||{};
    document.getElementById('week-label').textContent = getWeekLabel(wk);
    const arr = Object.values(items).sort((a,b)=>(a.sortOrder||a.addedAt)-(b.sortOrder||b.addedAt));
    const pending = arr.filter(i=>!i.done);
    const done = arr.filter(i=>i.done);
    const total = done.reduce((s,i)=>s+(i.price||0),0);
    document.getElementById('total-price').textContent = total>0?`סה״כ: ₪${total.toFixed(2)}`:'';
    document.getElementById('item-count').textContent = `${pending.length} פריטים`;
    const list = document.getElementById('items-list');
    list.innerHTML = '';
    if (!arr.length) {
      list.innerHTML = `<div class="empty-state"><div style="font-size:3rem">🛒</div><p>הרשימה ריקה</p></div>`;
      return;
    }
    pending.forEach(item => list.appendChild(this.createItemEl(wk, item)));
    if (done.length) {
      const div = document.createElement('div');
      div.className = 'divider-label';
      div.textContent = `✓ נלקח (${done.length})`;
      list.appendChild(div);
      done.forEach(item => list.appendChild(this.createItemEl(wk, item)));
    }
  },

  createItemEl(weekKey, item) {
    const wrap = document.createElement('div');
    wrap.className = 'item-wrap';
    wrap.dataset.id = item.id;

    const qty  = item.qty>1 ? `<span class="qty-badge">×${item.qty}</span>` : '';
    const img  = item.image ? `<img src="${item.image}" class="item-thumb" onclick="event.stopPropagation();APP.showImage('${item.image}')">` : '';
    const auto = item.autoAdded ? `<span class="auto-badge">🤖</span>` : '';

    wrap.innerHTML = `
      <div class="swipe-hint-left">📅 שבוע הבא</div>
      <div class="swipe-hint-right">🗑 מחיקה</div>
      <div class="item-card${item.done?' done':''}">
        <div class="drag-handle">⠿</div>
        ${img}
        <div class="item-content">
          <div class="item-top-row">
            <span class="item-name">${item.name}</span>
            ${qty}${auto}
          </div>
          ${item.done?'<span class="done-check">✓ נלקח</span>':''}
        </div>
        <div class="price-inline">
          <span class="price-sym">₪</span>
          <input type="number" class="price-input" placeholder="—"
            value="${item.price||''}"
            step="0.1" min="0">
        </div>
      </div>`;

    const card   = wrap.querySelector('.item-card');
    const hintL  = wrap.querySelector('.swipe-hint-left');
    const hintR  = wrap.querySelector('.swipe-hint-right');
    const handle = wrap.querySelector('.drag-handle');
    const priceInput = wrap.querySelector('.price-input');

    // Price save
    priceInput.addEventListener('change', e => {
      e.stopPropagation();
      APP.setPrice(weekKey, item.id, e.target.value);
    });
    priceInput.addEventListener('click', e => e.stopPropagation());
    priceInput.addEventListener('touchstart', e => e.stopPropagation(), {passive:true});

    // Tap to toggle done (single tap, not on handle/price)
    card.addEventListener('click', e => {
      if (e.target.closest('.drag-handle') || e.target.closest('.price-input') || e.target.closest('.item-thumb')) return;
      APP.toggleDone(weekKey, item.id);
    });

    // Double-tap / dblclick to edit
    let lastTap = 0;
    card.addEventListener('touchend', e => {
      if (e.target.closest('.drag-handle') || e.target.closest('.price-input')) return;
      const now = Date.now();
      if (now - lastTap < 350) APP.openEdit(weekKey, item.id);
      lastTap = now;
    });
    card.addEventListener('dblclick', e => {
      if (e.target.closest('.drag-handle') || e.target.closest('.price-input')) return;
      APP.openEdit(weekKey, item.id);
    });

    // Swipe left/right (skip if on handle or price)
    let sx = 0, swipeActive = false;
    card.addEventListener('touchstart', e => {
      if (e.target.closest('.drag-handle') || e.target.closest('.price-input')) return;
      sx = e.touches[0].clientX; swipeActive = true;
      card.style.transition = 'none';
    }, {passive:true});
    card.addEventListener('touchmove', e => {
      if (!swipeActive) return;
      const dx = e.touches[0].clientX - sx;
      card.style.transform = `translateX(${dx}px)`;
      hintL.style.opacity = dx < -20 ? Math.min(1, Math.abs(dx)/80) : 0;
      hintR.style.opacity = dx > 20  ? Math.min(1, dx/80) : 0;
    }, {passive:true});
    card.addEventListener('touchend', e => {
      if (!swipeActive) return;
      swipeActive = false;
      const dx = parseFloat(card.style.transform.replace(/[^-\d.]/g,'')) || 0;
      card.style.transition = 'transform 0.3s ease';
      hintL.style.opacity = 0; hintR.style.opacity = 0;
      if (dx < -80)      { card.style.transform='translateX(-120%)'; setTimeout(()=>APP.moveToNextWeek(weekKey,item.id),250); }
      else if (dx > 80)  { card.style.transform='translateX(120%)';  setTimeout(()=>APP.deleteItem(weekKey,item.id),250); }
      else               { card.style.transform='translateX(0)'; }
    });

    // Drag handle → vertical sort
    handle.addEventListener('touchstart', e => {
      e.stopPropagation();
      DRAG.start(wrap, e.touches[0].clientY);
    }, {passive:true});
    handle.addEventListener('mousedown', e => {
      e.stopPropagation();
      DRAG.start(wrap, e.clientY);
    });

    return wrap;
  },

  openEdit(weekKey, id) {
    const item = this.items[weekKey]?.[id]; if (!item) return;
    document.getElementById('edit-name-input').value = item.name;
    document.getElementById('edit-qty-input').value  = item.qty||1;
    const modal = document.getElementById('edit-modal');
    modal.dataset.week = weekKey;
    modal.dataset.id   = id;
    modal.classList.add('active');
    setTimeout(()=>document.getElementById('edit-name-input').focus(), 100);
  },

  async saveEdit() {
    const modal = document.getElementById('edit-modal');
    const name = document.getElementById('edit-name-input').value.trim();
    const qty  = parseInt(document.getElementById('edit-qty-input').value)||1;
    await this.updateItem(modal.dataset.week, modal.dataset.id, name, qty);
    modal.classList.remove('active');
  },

  showImage(src) {
    document.getElementById('img-modal-img').src = src;
    document.getElementById('img-modal').classList.add('active');
  },

  renderWeekSelector() {
    const d2 = new Date(); d2.setDate(d2.getDate()+7);
    const all = [...new Set([getWeekKey(), getWeekKey(d2), ...Object.keys(this.items)])].sort().reverse();
    const sel = document.getElementById('week-select');
    const cur = this.currentWeek;
    sel.innerHTML = '';
    all.forEach(wk => {
      const o = document.createElement('option');
      o.value = wk; o.textContent = getWeekLabel(wk);
      if (wk === cur) o.selected = true;
      sel.appendChild(o);
    });
  },

  switchWeek(wk) { this.currentWeek = wk; this.renderList(); this.checkSmartSuggestions(); },

  checkSmartSuggestions() {
    const wk = this.currentWeek;
    const curNames = Object.values(this.items[wk]||{}).map(i=>i.name.toLowerCase());
    const now = Date.now(); const sugg = [];
    Object.entries(this.stats).forEach(([name,stat]) => {
      if (stat.count < 2 || curNames.includes(name)) return;
      const avgWeeks = stat.weeks.length > 1 ? (stat.weeks.length-1)/(stat.count-1) : 3;
      const daysSince = stat.lastAdded ? (now-stat.lastAdded)/86400000 : 999;
      if (daysSince >= avgWeeks*7*0.8) sugg.push({name, days:Math.round(avgWeeks*7), since:Math.round(daysSince)});
    });
    const c = document.getElementById('suggestions');
    if (!sugg.length) { c.style.display='none'; return; }
    c.style.display = 'block';
    c.innerHTML = `<div class="sugg-title">🤖 הסל הזכור — הגיע הזמן:</div>` +
      sugg.slice(0,5).map(s=>`
        <div class="sugg-chip" onclick="APP.addItem('${s.name}');APP.showToast('✅ נוסף!')">
          <span>${s.name}</span><small>~כל ${s.days} יום</small>
          <span class="chip-plus">+</span>
        </div>`).join('');
    sugg.filter(s=>s.since>=s.days*2).forEach(s=>{
      const already = Object.values(this.items[wk]||{}).some(i=>i.name.toLowerCase()===s.name&&i.autoAdded);
      if (!already) this.addAutoItem(s.name, wk);
    });
  },

  async addAutoItem(name, wk) {
    if (!this.items[wk]) this.items[wk] = {};
    const id = 'auto_'+Date.now();
    const vals = Object.values(this.items[wk]);
    const maxOrder = vals.length ? Math.max(...vals.map(i=>i.sortOrder||0)) : 0;
    this.items[wk][id] = {id,name,qty:1,done:false,price:null,image:null,addedAt:Date.now(),sortOrder:maxOrder+1000,autoAdded:true};
    await this.saveData();
    this.showToast(`🤖 הסל הזכור הוסיף: ${name}`);
  },

  renderStats() {
    const c = document.getElementById('stats-content');
    const entries = Object.entries(this.stats)
      .filter(([,s])=>s.count>=1)
      .map(([name,s])=>({name,count:s.count,avg:s.weeks.length>1?Math.round((s.weeks.length-1)/(s.count-1)*7):'?'}))
      .sort((a,b)=>b.count-a.count).slice(0,20);
    if (!entries.length) { c.innerHTML='<p class="stats-empty">עדיין אין נתונים 📊</p>'; return; }
    c.innerHTML = `<div class="stats-hdr"><span>מוצר</span><span>ממוצע</span><span>פעמים</span></div>` +
      entries.map(e=>`<div class="stat-row">
        <span class="stat-name">${e.name}</span>
        <span class="stat-avg">${e.avg==='?'?'—':`~${e.avg} ימים`}</span>
        <span class="stat-cnt">${e.count}×</span>
      </div>`).join('');
  },

  comparePrice() {
    const w1=parseFloat(document.getElementById('p1-weight').value);
    const p1=parseFloat(document.getElementById('p1-price').value);
    const w2=parseFloat(document.getElementById('p2-weight').value);
    const p2=parseFloat(document.getElementById('p2-price').value);
    if (!w1||!p1||!w2||!p2) { this.showToast('⚠️ מלא את כל השדות'); return; }
    const u1=p1/w1, u2=p2/w2;
    const res = document.getElementById('compare-result');
    if (u1<u2) { const pct=(((u2-u1)/u2)*100).toFixed(1); res.innerHTML=`<div class="cmp-win">🏆 מוצר א׳ זול ב-<strong>${pct}%</strong></div><div class="cmp-det">₪${u1.toFixed(3)} ליח׳ לעומת ₪${u2.toFixed(3)} ליח׳</div>`; }
    else if (u2<u1) { const pct=(((u1-u2)/u1)*100).toFixed(1); res.innerHTML=`<div class="cmp-win">🏆 מוצר ב׳ זול ב-<strong>${pct}%</strong></div><div class="cmp-det">₪${u2.toFixed(3)} ליח׳ לעומת ₪${u1.toFixed(3)} ליח׳</div>`; }
    else res.innerHTML=`<div class="cmp-win">🤝 זהים!</div>`;
  },

  showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className='toast active';
    setTimeout(()=>t.className='toast',2500);
  }
};

window.addEventListener('DOMContentLoaded', () => window.APP.init());
</script>

<style>

<!-- EDIT MODAL -->

    </div>
  </div>

<div class="modal-overlay" id="img-search-modal" onclick="if(event.target===this)this.classList.remove('active')">
  <div class="modal" style="max-width:400px">
    <h3>🔍 חפש תמונה ברשת</h3>
    <div class="img-search-bar">
      <input type="text" id="img-search-input" placeholder="למשל: קורנפלקס תלמה"
        onkeydown="if(event.key==='Enter')searchImages()">
      <button class="img-search-go" onclick="searchImages()">חפש</button>

    <img id="img-modal-img" src="" alt="">
  </div>
</div>

<script>
function switchTab(name, el) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(name+'-panel').classList.add('active');
  el.classList.add('active');
  if (name==='stats') APP.renderStats();
}

function doAdd() {
  const name = document.getElementById('item-input').value.trim();
  const qty  = parseInt(document.getElementById('qty-input').value)||1;
  if (name) APP.addItem(name, window._pendingImage, qty);
}

function handleImageFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    window._pendingImage = ev.target.result;
    document.getElementById('preview-img').src = ev.target.result;
    document.getElementById('image-preview').style.display = 'block';
  };
  r.readAsDataURL(file);
}

function clearImage() {
  window._pendingImage = null;
  document.getElementById('image-preview').style.display = 'none';
  document.getElementById('preview-img').src = '';
}

// Image search via Unsplash API (free, no key needed for source.unsplash.com)
let selectedImgUrl = null;

function openImageSearch() {
  const name = document.getElementById('item-input').value.trim();
  if (name) document.getElementById('img-search-input').value = name;
  document.getElementById('img-search-modal').classList.add('active');
  document.getElementById('img-grid').innerHTML = '<div class="img-grid-empty">הקלד מוצר ולחץ חפש</div>';
  document.getElementById('img-select-btn').style.display = 'none';
  selectedImgUrl = null;
  if (name) searchImages();
}

async function searchImages() {
  const q = document.getElementById('img-search-input').value.trim();
  if (!q) return;
  const grid = document.getElementById('img-grid');
  grid.innerHTML = '<div class="img-grid-empty">מחפש...</div>';
  selectedImgUrl = null;
  document.getElementById('img-select-btn').style.display = 'none';

  // Use Unsplash source for random product images
  const terms = encodeURIComponent(q);
  const imgs = Array.from({length:9}, (_,i) =>
    `https://source.unsplash.com/150x150/?${terms}&sig=${i+Date.now()}`
  );

  grid.innerHTML = '';
  imgs.forEach(url => {
    const img = document.createElement('img');
    img.src = url;
    img.loading = 'lazy';
    img.onerror = () => img.remove();
    img.onclick = () => {
      grid.querySelectorAll('img').forEach(i=>i.classList.remove('selected'));
      img.classList.add('selected');
      selectedImgUrl = url;
      document.getElementById('img-select-btn').style.display = 'block';
    };
    grid.appendChild(img);
  });
}

async function confirmImageSearch() {
  if (!selectedImgUrl) return;
  // Convert to base64 via canvas
  try {
    const res = await fetch(selectedImgUrl);
    const blob = await res.blob();
    const reader = new FileReader();
    reader.onload = ev => {
      window._pendingImage = ev.target.result;
      document.getElementById('preview-img').src = ev.target.result;
      document.getElementById('image-preview').style.display = 'block';
      document.getElementById('img-search-modal').classList.remove('active');
      APP.showToast('✅ תמונה נבחרה!');
    };
    reader.readAsDataURL(blob);
  } catch(e) {
    // fallback: use URL directly
    window._pendingImage = selectedImgUrl;
    document.getElementById('preview-img').src = selectedImgUrl;
    document.getElementById('image-preview').style.display = 'block';
    document.getElementById('img-search-modal').classList.remove('active');
    APP.showToast('✅ תמונה נבחרה!');
  }
}
</script>
</body>
</html>
