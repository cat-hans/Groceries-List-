<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🛒 הסל שלנו</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
<!-- Firebase compat (no module needed) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- hidden file inputs -->
<input type="file" id="fi-gal" accept="image/*"                    style="display:none" onchange="onFileChosen(event)">
<input type="file" id="fi-cam" accept="image/*" capture="environment" style="display:none" onchange="onFileChosen(event)">

<!-- HEADER -->
<div id="header">
  <div class="hrow">
    <div class="logo">🛒 הסל <span>שלנו</span></div>
    <span id="sync-badge">טוען...</span>
  </div>
  <div class="hrow">
    <select id="wk-sel" onchange="switchWeek(this.value)"></select>
    <span id="wk-label"></span>
  </div>
</div>

<!-- SHOP BAR (voice shopping) -->
<div id="shop-bar">
  <div id="shop-info">
    <div id="shop-name">—</div>
    <div id="shop-hint"></div>
  </div>
  <div class="shop-btns">
    <button class="btn-take" onclick="shopTake()">✓ לקחתי</button>
    <button class="btn-skip" onclick="shopSkip()">דלג ▶</button>
    <button class="btn-stop" onclick="shopStop()">✕</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" id="tab-list"    onclick="showTab('list')">🛒 רשימה</div>
  <div class="tab"        id="tab-stats"   onclick="showTab('stats')">📊 סטטיסטיקות</div>
  <div class="tab"        id="tab-compare" onclick="showTab('compare')">⚖️ השוואה</div>
</div>

<!-- LIST PANEL -->
<div id="panel-list" class="panel">
  <!-- image preview -->
  <div id="img-preview">
    <img id="img-prev-img" src="" alt="">
    <button onclick="clearImg()">✕</button>
  </div>

  <!-- add bar -->
  <div class="add-bar">
    <input type="text" id="inp" placeholder="מוצר חדש..." onkeydown="if(event.key==='Enter')addClicked()">
    <button class="btn-cam" onclick="openSheet()">📷</button>
    <button class="btn-add" onclick="addClicked()">הוסף</button>
  </div>
  <div class="qty-row">
    <span class="qty-label">כמות:</span>
    <input type="number" id="qty" min="1" max="99" placeholder="1">
  </div>

  <button class="btn-shop-start" onclick="shopStart()">🎙️ התחל קניה קולית</button>


  <div class="list-meta">
    <span id="item-count"></span>
    <span id="list-total"></span>
  </div>
  <div id="list"></div>
</div>

<!-- STATS PANEL -->
<div id="panel-stats" class="panel" style="display:none">
  <!-- Copy basket -->
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    <select id="copy-to-wk" style="flex:1;background:var(--s2);color:var(--t);border:1px solid var(--bd);border-radius:8px;padding:7px 9px;font-family:inherit;font-size:.8rem"></select>
    <button onclick="copyBasket()" style="background:var(--b);color:#000;border:none;border-radius:9px;padding:8px 13px;font-weight:700;font-family:inherit;cursor:pointer;font-size:.82rem;white-space:nowrap">📋 העתק סל</button>
  </div>
  <!-- הסל הזכור -->
  <div id="suggestions" style="margin-bottom:14px"></div>
  <!-- Monthly view -->
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
    <button onclick="prevMonth()" style="background:var(--s2);color:var(--t);border:1px solid var(--bd);border-radius:8px;padding:6px 11px;cursor:pointer;font-family:inherit">‹</button>
    <span id="month-label" style="flex:1;text-align:center;font-size:.85rem;font-weight:700"></span>
    <button onclick="nextMonth()" style="background:var(--s2);color:var(--t);border:1px solid var(--bd);border-radius:8px;padding:6px 11px;cursor:pointer;font-family:inherit">›</button>
  </div>
  <div id="month-view" style="margin-bottom:16px"></div>
  <!-- Stats table -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <p class="panel-title" style="margin:0">📊 דפוסי הקנייה שלי</p>
    <button onclick="clearStats()" style="background:var(--rd);color:#fff;border:none;border-radius:8px;padding:5px 11px;font-family:inherit;font-size:.78rem;cursor:pointer">מחק סטטיסטיקה</button>
  </div>
  <p class="panel-sub">הסל לומד מתי קונים כל מוצר</p>
  <div id="stats-content"></div>
</div>

<!-- COMPARE PANEL -->
<div id="panel-compare" class="panel" style="display:none">
  <p class="panel-title">⚖️ מה יותר משתלם?</p>
  <div class="cmp-grid">
    <div class="cmp-col">
      <div class="cmp-title">מוצר א׳</div>
      <label>משקל/נפח</label><input type="number" id="w1" placeholder="500">
      <label>מחיר ₪</label><input type="number" id="p1" placeholder="12.90">
    </div>
    <div class="cmp-col">
      <div class="cmp-title">מוצר ב׳</div>
      <label>משקל/נפח</label><input type="number" id="w2" placeholder="1000">
      <label>מחיר ₪</label><input type="number" id="p2" placeholder="19.90">
    </div>
  </div>
  <button class="btn-cmp" onclick="doCompare()">השווה 🔍</button>
  <div id="cmp-result"></div>
</div>

<!-- EDIT MODAL -->
<div id="edit-modal" class="overlay" onclick="if(event.target===this)closeEdit()">
  <div class="modal-box">
    <h3>✏️ עריכת מוצר</h3>
    <input class="modal-inp" type="text" id="edit-name" placeholder="שם מוצר" onkeydown="if(event.key==='Enter')saveEdit()">
    <label>כמות</label>
    <input class="modal-inp" type="number" id="edit-qty" placeholder="1" min="1" max="99">
    <div class="modal-btns">
      <button class="bp" onclick="saveEdit()">שמור</button>
      <button class="bs" onclick="closeEdit()">ביטול</button>
    </div>
  </div>
</div>

<!-- IMAGE SHEET -->
<div id="img-sheet" class="sheet-overlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet-box">
    <div class="sheet-title">הוסף תמונה למוצר</div>
    <button class="sheet-opt" onclick="document.getElementById('fi-gal').click()">📁 בחר מהגלריה</button>
    <button class="sheet-opt" onclick="document.getElementById('fi-cam').click()">📸 צלם עכשיו</button>
    <button class="sheet-opt" onclick="toggleSearch()">🔍 חפש ברשת</button>
    <div id="search-area" style="display:none;margin-top:12px;border-top:1px solid #2d3249;padding-top:12px">
      <div class="search-bar">
        <input type="text" id="search-q" placeholder="שם מוצר בעברית או אנגלית..." onkeydown="if(event.key==='Enter')runSearch()">
        <button onclick="runSearch()">חפש</button>
      </div>
      <p style="font-size:.7rem;color:var(--t2);margin:4px 0 8px;text-align:center">מאגר מוצרי מזון עם תמונות אריזות אמיתיות</p>
      <div id="img-grid"></div>
      <button id="pick-btn" class="bp" style="display:none;width:100%;margin-top:8px" onclick="pickImg()">✅ בחר תמונה זו</button>
    </div>
    <button class="sheet-cancel" onclick="closeSheet()">ביטול</button>
  </div>
</div>

<!-- BIG IMAGE MODAL -->
<div id="big-img-modal" class="overlay" onclick="this.style.display='none'">
  <img id="big-img" src="" style="max-width:90vw;max-height:85vh;border-radius:12px;object-fit:contain">
</div>

<div id="toast"></div>

<style>
:root {
  --bg:#0f1117; --s:#1a1d27; --s2:#22263a;
  --g:#4ade80; --b:#38bdf8; --rd:#f87171;
  --t:#f1f5f9; --t2:#94a3b8; --bd:#2d3249; --r:14px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:'Rubik',sans-serif; background:var(--bg); color:var(--t); direction:rtl; }

/* HEADER */
#header { background:var(--s); border-bottom:1px solid var(--bd); padding:12px 14px 10px; position:sticky; top:0; z-index:50; }
.hrow { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.hrow + .hrow { margin-top:8px; }
.logo { font-size:1.3rem; font-weight:900; }
.logo span { color:var(--g); }
#sync-badge { font-size:.68rem; padding:3px 8px; border-radius:20px; background:rgba(148,163,184,.15); color:var(--t2); white-space:nowrap; }
#sync-badge.ok { background:rgba(74,222,128,.15); color:var(--g); }
#wk-sel { flex:1; background:var(--s2); color:var(--t); border:1px solid var(--bd); border-radius:8px; padding:5px 9px; font-family:inherit; font-size:.78rem; }
#wk-label { font-size:.7rem; color:var(--t2); white-space:nowrap; }

/* SHOP BAR */
#shop-bar { display:none; align-items:center; gap:8px; background:#061206; border-bottom:2px solid var(--g); padding:10px 14px; flex-wrap:wrap; }
#shop-info { flex:1; min-width:100px; }
#shop-name { font-size:.95rem; font-weight:700; }
#shop-hint { font-size:.68rem; color:var(--t2); margin-top:1px; }
.shop-btns { display:flex; gap:6px; }
.btn-take { background:var(--g); color:#000; border:none; border-radius:8px; padding:8px 13px; font-family:inherit; font-weight:700; font-size:.85rem; cursor:pointer; }
.btn-skip { background:var(--s2); color:var(--t); border:1px solid var(--bd); border-radius:8px; padding:8px 11px; font-family:inherit; font-size:.82rem; cursor:pointer; }
.btn-stop { background:var(--rd); color:#fff; border:none; border-radius:8px; padding:8px 11px; font-family:inherit; font-weight:700; font-size:.82rem; cursor:pointer; }

/* TABS */
.tabs { display:flex; background:var(--s); border-bottom:1px solid var(--bd); }
.tab { flex:1; padding:11px; text-align:center; font-size:.77rem; cursor:pointer; border-bottom:2px solid transparent; color:var(--t2); font-weight:500; }
.tab.active { color:var(--g); border-bottom-color:var(--g); }

/* PANELS */
.panel { padding:13px; max-width:600px; margin:0 auto; }

/* ADD BAR */
#img-preview { display:none; position:relative; width:fit-content; margin-bottom:8px; }
#img-preview img { width:64px; height:64px; object-fit:cover; border-radius:9px; border:2px solid var(--g); }
#img-preview button { position:absolute; top:-5px; left:-5px; background:var(--rd); color:#fff; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer; font-size:.7rem; display:flex; align-items:center; justify-content:center; }
.add-bar { display:flex; gap:7px; background:var(--s); border:1px solid var(--bd); border-radius:var(--r); padding:8px; align-items:center; margin-bottom:8px; }
.add-bar input[type=text] { flex:1; background:transparent; border:none; color:var(--t); font-family:inherit; font-size:1rem; outline:none; }
.add-bar input::placeholder { color:var(--t2); }
.btn-cam { background:none; border:none; cursor:pointer; font-size:1.25rem; padding:2px 4px; }
.btn-add { background:var(--g); color:#000; border:none; cursor:pointer; border-radius:10px; padding:8px 14px; font-weight:700; font-size:.9rem; font-family:inherit; white-space:nowrap; }
.qty-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.qty-label { font-size:.76rem; color:var(--t2); }
.qty-row input { background:var(--s2); border:1px solid var(--bd); color:var(--t); border-radius:8px; padding:5px 9px; font-family:inherit; font-size:.9rem; width:58px; text-align:center; outline:none; }
.btn-shop-start { width:100%; background:transparent; border:1px solid var(--g); color:var(--g); border-radius:var(--r); padding:11px; font-family:inherit; font-weight:700; font-size:.92rem; cursor:pointer; margin-bottom:12px; }

/* SUGGESTIONS */
#suggestions { margin-bottom:10px; }
.sugg-title { font-size:.72rem; color:var(--t2); margin-bottom:6px; }
.sugg-chip { display:inline-flex; align-items:center; gap:5px; background:var(--s2); border:1px solid var(--bd); border-radius:20px; padding:5px 9px; margin:3px; cursor:pointer; font-size:.77rem; }
.sugg-plus { background:var(--g); color:#000; border-radius:50%; width:17px; height:17px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.72rem; }

/* LIST META */
.list-meta { display:flex; justify-content:space-between; margin-bottom:9px; font-size:.8rem; }
#item-count { color:var(--t2); }
#list-total { color:var(--g); font-weight:700; }

/* ITEM */
.iw { position:relative; margin-bottom:7px; overflow:hidden; border-radius:var(--r); }
.swipe-left, .swipe-right { position:absolute; top:0; bottom:0; display:flex; align-items:center; padding:0 16px; font-size:.78rem; font-weight:700; opacity:0; pointer-events:none; border-radius:var(--r); }
.swipe-left  { right:0; background:linear-gradient(to left, rgba(56,189,248,.3),transparent); color:var(--b); }
.swipe-right { left:0;  background:linear-gradient(to right,rgba(248,113,113,.3),transparent); color:var(--rd); }
.ic { position:relative; z-index:1; display:flex; align-items:center; gap:8px; background:var(--s); border:1px solid var(--bd); border-radius:var(--r); padding:10px; cursor:pointer; animation:si .18s ease; }
@keyframes si { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
.ic.done-item { opacity:.45; }
.iw.dragging .ic { border-color:var(--g); opacity:.8; box-shadow:0 4px 20px rgba(0,0,0,.5); }
.iw.drag-over .ic { border-color:rgba(74,222,128,.5); background:rgba(74,222,128,.06); }
.dh { font-size:1.2rem; color:var(--t2); cursor:grab; padding:2px 5px; flex-shrink:0; touch-action:none; user-select:none; }
.dh:active { color:var(--g); }
.item-img { width:38px; height:38px; object-fit:cover; border-radius:7px; flex-shrink:0; cursor:pointer; }
.item-text { flex:1; min-width:0; }
.item-top { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.item-name { font-size:.93rem; font-weight:500; }
.ic.done-item .item-name { text-decoration:line-through; color:var(--t2); }
.done-label { font-size:.7rem; color:var(--g); font-weight:700; display:block; margin-top:2px; }
.qty-badge { background:var(--b); color:#000; border-radius:8px; padding:1px 6px; font-size:.7rem; font-weight:700; flex-shrink:0; }
.auto-badge { font-size:.78rem; }
.price-wrap { display:flex; align-items:center; gap:2px; flex-shrink:0; }
.price-sym { font-size:.7rem; color:var(--t2); }
.price-inp { width:52px; background:var(--s2); border:1px solid var(--bd); color:var(--g); border-radius:7px; padding:3px 4px; font-family:inherit; font-size:.78rem; font-weight:700; text-align:center; outline:none; cursor:text; }
.price-inp:focus { border-color:var(--g); }
.done-divider { font-size:.73rem; color:var(--t2); padding:7px 3px 3px; }
.empty-list { text-align:center; padding:40px 20px; color:var(--t2); }
.empty-list .empty-icon { font-size:2.5rem; margin-bottom:10px; }

/* STATS */
.panel-title { font-size:.97rem; font-weight:700; margin-bottom:5px; }
.panel-sub { font-size:.75rem; color:var(--t2); margin-bottom:12px; }
.stat-hdr { display:flex; font-size:.67rem; color:var(--t2); font-weight:700; padding-bottom:5px; border-bottom:1px solid var(--bd); margin-bottom:7px; }
.stat-hdr span:first-child { flex:1; }
.stat-row { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid rgba(45,50,73,.5); }
.sn { flex:1; font-size:.83rem; }
.sa { font-size:.73rem; color:var(--t2); min-width:75px; }
.sc { font-size:.78rem; color:var(--g); font-weight:700; min-width:28px; text-align:left; }

/* COMPARE */
.cmp-grid { display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-bottom:13px; }
.cmp-col { background:var(--s2); border-radius:11px; padding:13px; }
.cmp-title { font-size:.73rem; color:var(--t2); margin-bottom:9px; font-weight:700; }
.cmp-col input { width:100%; background:var(--s); border:1px solid var(--bd); color:var(--t); border-radius:8px; padding:7px 9px; font-family:inherit; font-size:.88rem; margin-bottom:7px; direction:rtl; outline:none; }
.btn-cmp { width:100%; background:var(--b); color:#000; border:none; border-radius:10px; padding:10px; font-weight:700; font-size:.92rem; cursor:pointer; font-family:inherit; margin-bottom:13px; }
#cmp-result { text-align:center; }
.cmp-win { font-size:1.05rem; font-weight:700; margin-bottom:5px; }
.cmp-det { font-size:.78rem; color:var(--t2); }

/* MODALS / OVERLAY */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.78); z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.overlay.open { display:flex; }
.modal-box { background:var(--s); border:1px solid var(--bd); border-radius:18px; padding:20px; width:90%; max-width:340px; animation:pop .2s; }
@keyframes pop { from{transform:scale(.9);opacity:0} to{transform:scale(1);opacity:1} }
.modal-box h3 { font-size:.97rem; margin-bottom:13px; }
.modal-inp { width:100%; background:var(--s2); border:1px solid var(--bd); color:var(--t); border-radius:9px; padding:9px 12px; font-family:inherit; font-size:.97rem; margin-bottom:9px; direction:rtl; outline:none; }
.modal-inp:focus { border-color:var(--g); }
.modal-btns { display:flex; gap:8px; }
.bp { flex:1; background:var(--g); color:#000; border:none; border-radius:9px; padding:10px; font-weight:700; cursor:pointer; font-family:inherit; }
.bs { flex:1; background:var(--s2); color:var(--t); border:1px solid var(--bd); border-radius:9px; padding:10px; cursor:pointer; font-family:inherit; }

/* SHEET */
.sheet-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.72); z-index:200; align-items:flex-end; justify-content:center; }
.sheet-overlay.open { display:flex; }
.sheet-box { background:var(--s); border-radius:20px 20px 0 0; padding:18px 16px 28px; width:100%; max-width:500px; }
.sheet-title { font-size:.76rem; color:var(--t2); text-align:center; margin-bottom:13px; }
.sheet-opt { display:flex; align-items:center; gap:10px; width:100%; background:var(--s2); border:1px solid var(--bd); color:var(--t); border-radius:12px; padding:13px 14px; font-family:inherit; font-size:.93rem; cursor:pointer; margin-bottom:8px; font-weight:500; }
.sheet-opt:active { border-color:var(--g); }
.sheet-cancel { width:100%; background:transparent; border:1px solid var(--bd); color:var(--t2); border-radius:12px; padding:11px; font-family:inherit; font-size:.9rem; cursor:pointer; margin-top:4px; }
.search-bar { display:flex; gap:7px; margin-bottom:8px; }
.search-bar input { flex:1; background:var(--s2); border:1px solid var(--bd); color:var(--t); border-radius:9px; padding:8px 11px; font-family:inherit; font-size:.9rem; outline:none; direction:rtl; }
.search-bar input:focus { border-color:var(--b); }
.search-bar button { background:var(--b); color:#000; border:none; border-radius:9px; padding:8px 13px; font-weight:700; cursor:pointer; font-family:inherit; }
#img-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; max-height:220px; overflow-y:auto; margin-bottom:8px; }
#img-grid img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; cursor:pointer; border:2px solid transparent; }
#img-grid img.sel { border-color:var(--g); }
#img-grid .grid-empty { grid-column:1/-1; text-align:center; color:var(--t2); padding:16px; font-size:.82rem; }

/* TOAST */
#toast { position:fixed; bottom:65px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--s); border:1px solid var(--bd); padding:9px 18px; border-radius:18px; font-size:.85rem; opacity:0; transition:all .28s; z-index:999; pointer-events:none; white-space:nowrap; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#big-img-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:300; align-items:center; justify-content:center; }
#big-img-modal.open { display:flex; }
label { font-size:.76rem; color:var(--t2); display:block; margin-bottom:3px; }
@media(max-width:400px){ .cmp-grid{grid-template-columns:1fr;} }
</style>

<script>
/* ════════════════════════════════
   DATA
════════════════════════════════ */
var DB = null;
var DATA = { items:{}, stats:{} };
var CW = weekKey(); // current week
var _img = null;    // pending image for new item

function weekKey(d) {
  var x = d ? new Date(d) : new Date();
  x.setHours(0,0,0,0);
  x.setDate(x.getDate() - x.getDay());
  return 'week_' + x.getFullYear() + '_' + pad(x.getMonth()+1) + '_' + pad(x.getDate());
}
function weekLabel(k) {
  var p = k.replace(/^w_|^week_/,'').split('_');
  var d = new Date(+p[0], +p[1]-1, +p[2]);
  var e = new Date(d); e.setDate(d.getDate()+6);
  return fmt(d) + ' – ' + fmt(e);
}
function fmt(d){ return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear(); }
function pad(n){ return String(n).padStart(2,'0'); }
function uid(){ return 'i'+ Date.now() + Math.random().toString(36).slice(2,4); }
function maxOrder(wk){ var vs=Object.values(DATA.items[wk]||{}); return vs.length?Math.max.apply(null,vs.map(function(x){return x.so||0;})):0; }

function saveLocal(){ try{localStorage.setItem('hasal', JSON.stringify(DATA));}catch(e){} }
function loadLocal(){ try{var d=JSON.parse(localStorage.getItem('hasal')||'{}'); DATA.items=d.items||{}; DATA.stats=d.stats||{};}catch(e){} }

function pushData(){
  saveLocal();
  if(DB){ DB.ref('/').set(DATA); }
}

function renderWeekSel(){
  var nd = new Date(); nd.setDate(nd.getDate()+7);
  var all = Object.keys(DATA.items).concat([weekKey(), weekKey(nd)]);
  var seen = {}; var uniq = [];
  all.forEach(function(k){ if(!seen[k]){seen[k]=1;uniq.push(k);} });
  uniq.sort().reverse();
  var sel = document.getElementById('wk-sel');
  sel.innerHTML = '';
  uniq.forEach(function(k){
    var o = document.createElement('option');
    o.value = k; o.textContent = weekLabel(k);
    if(k === CW) o.selected = true;
    sel.appendChild(o);
  });
  document.getElementById('wk-label').textContent = weekLabel(CW);
}
function switchWeek(k){ CW = k; renderList(); checkSugg(); document.getElementById('wk-label').textContent = weekLabel(CW); }

/* ════════════════════════════════
   ADD ITEM
════════════════════════════════ */
function addClicked(){
  var name = document.getElementById('inp').value.trim();
  var qty  = parseInt(document.getElementById('qty').value) || 1;
  if(!name) return;
  addItem(name, _img, qty, CW);
  document.getElementById('inp').value = '';
  document.getElementById('qty').value = '';
  clearImg();
}

function addItem(name, img, qty, wk){
  wk = wk || CW;
  if(!DATA.items[wk]) DATA.items[wk] = {};
  var id = uid();
  DATA.items[wk][id] = { id:id, name:name, qty:qty||1, done:false, price:null, image:img||null, at:Date.now(), so:maxOrder(wk)+1000, auto:false };
  var k = name.toLowerCase();
  if(!DATA.stats[k]) DATA.stats[k] = { count:0, weeks:[], last:null };
  if(DATA.stats[k].weeks.indexOf(wk) < 0) DATA.stats[k].weeks.push(wk);
  DATA.stats[k].count++;
  DATA.stats[k].last = Date.now();
  pushData();
}

function toggleDone(wk, id){
  if(DATA.items[wk] && DATA.items[wk][id]){
    DATA.items[wk][id].done = !DATA.items[wk][id].done;
    pushData();
  }
}
function setPrice(wk, id, v){
  if(DATA.items[wk] && DATA.items[wk][id]){
    DATA.items[wk][id].price = parseFloat(v) || null;
    pushData();
  }
}
function moveNext(wk, id){
  var it = DATA.items[wk] && DATA.items[wk][id];
  if(!it) return;
  var nd = new Date(); nd.setDate(nd.getDate()+7);
  var nw = weekKey(nd);
  if(!DATA.items[nw]) DATA.items[nw] = {};
  var nid = uid();
  DATA.items[nw][nid] = { id:nid, name:it.name, qty:it.qty, done:false, price:null, image:it.image, at:Date.now(), so:maxOrder(nw)+1000, auto:false };
  delete DATA.items[wk][id];
  pushData();
  showToast('📅 הועבר לשבוע הבא!');
}
function delItem(wk, id){
  if(DATA.items[wk]) { delete DATA.items[wk][id]; pushData(); }
}

function renderList(){
  var wk = CW;
  var all = Object.values(DATA.items[wk] || {}).sort(function(a,b){ return (a.so||a.at)-(b.so||b.at); });
  var pen = all.filter(function(i){ return !i.done; });
  var dn  = all.filter(function(i){ return i.done; });

  var tot = dn.reduce(function(s,i){ return s+(i.price||0); }, 0);
  document.getElementById('item-count').textContent = pen.length + ' פריטים';
  document.getElementById('list-total').textContent = tot > 0 ? 'סה״כ: ₪'+tot.toFixed(2) : '';

  var L = document.getElementById('list');
  L.innerHTML = '';

  if(!all.length){
    L.innerHTML = '<div class="empty-list"><div class="empty-icon">🛒</div><p>הרשימה ריקה</p></div>';
    return;
  }

  pen.forEach(function(it){ L.appendChild(makeEl(wk, it)); });

  if(dn.length){
    var div = document.createElement('div');
    div.className = 'done-divider';
    div.textContent = '✓ נלקח (' + dn.length + ')';
    L.appendChild(div);
    dn.forEach(function(it){ L.appendChild(makeEl(wk, it)); });
  }
}

function makeEl(wk, it){
  var wrap = document.createElement('div');
  wrap.className = 'iw' + (it.done ? ' done-wrap' : '');
  wrap.dataset.id = it.id;

  var imgHtml  = it.image ? '<img src="'+it.image+'" class="item-img" onclick="event.stopPropagation();showBigImg(this.src)">' : '';
  var qtyHtml  = it.qty > 1 ? '<span class="qty-badge">×'+it.qty+'</span>' : '';
  var autoHtml = it.auto ? '<span class="auto-badge" title="הסל הזכור">🤖</span>' : '';
  var doneHtml = it.done ? '<span class="done-label">✓ נלקח</span>' : '';
  var dragHtml = it.done ? '' : '<div class="dh" title="גרור">↑↓</div>';

  wrap.innerHTML =
    '<div class="swipe-left">📅 שבוע הבא</div>' +
    '<div class="swipe-right">🗑 מחיקה</div>' +
    '<div class="ic' + (it.done ? ' done-item' : '') + '">' +
      dragHtml +
      imgHtml +
      '<div class="item-text">' +
        '<div class="item-top"><span class="item-name">'+it.name+'</span>'+qtyHtml+autoHtml+'</div>' +
        doneHtml +
      '</div>' +
      '<div class="price-wrap">' +
        '<span class="price-sym">₪</span>' +
        '<input type="number" class="price-inp" placeholder="—" value="'+(it.price||'')+'" step="0.1" min="0">' +
      '</div>' +
    '</div>';

  var card = wrap.querySelector('.ic');
  var hl   = wrap.querySelector('.swipe-left');
  var hr   = wrap.querySelector('.swipe-right');
  var pinp = wrap.querySelector('.price-inp');

  /* price */
  pinp.addEventListener('click',  function(e){ e.stopPropagation(); });
  pinp.addEventListener('touchstart', function(e){ e.stopPropagation(); }, {passive:true});
  pinp.addEventListener('change', function(e){ e.stopPropagation(); setPrice(wk, it.id, e.target.value); });

  /* tap = toggle done */
  card.addEventListener('click', function(e){
    if(e.target.closest('.dh') || e.target.closest('.price-inp') || e.target.closest('.item-img')) return;
    toggleDone(wk, it.id);
  });

  /* long press = edit */
  var lpt = null;
  card.addEventListener('touchstart', function(e){
    if(e.target.closest('.dh') || e.target.closest('.price-inp')) return;
    lpt = setTimeout(function(){ lpt=null; openEdit(wk, it.id); }, 650);
  }, {passive:true});
  card.addEventListener('touchend',  function(){ if(lpt){ clearTimeout(lpt); lpt=null; } });
  card.addEventListener('touchmove', function(){ if(lpt){ clearTimeout(lpt); lpt=null; } });
  card.addEventListener('contextmenu', function(e){ e.preventDefault(); openEdit(wk, it.id); });

  /* swipe L/R */
  var sx=0, sw=false;
  card.addEventListener('touchstart', function(e){
    if(e.target.closest('.dh') || e.target.closest('.price-inp')) return;
    sx = e.touches[0].clientX; sw = true; card.style.transition='none';
  }, {passive:true});
  card.addEventListener('touchmove', function(e){
    if(!sw) return;
    var dx = e.touches[0].clientX - sx;
    card.style.transform = 'translateX('+dx+'px)';
    hl.style.opacity = dx < -20 ? Math.min(1, Math.abs(dx)/80) : 0;
    hr.style.opacity = dx >  20 ? Math.min(1, dx/80) : 0;
  }, {passive:true});
  card.addEventListener('touchend', function(){
    if(!sw) return; sw=false;
    var dx = parseFloat(card.style.transform.replace(/[^-\d.]/g,'')) || 0;
    card.style.transition = 'transform .28s';
    hl.style.opacity = 0; hr.style.opacity = 0;
    if(dx < -80){ card.style.transform='translateX(-120%)'; setTimeout(function(){ moveNext(wk,it.id); },240); }
    else if(dx > 80){ card.style.transform='translateX(120%)'; setTimeout(function(){ delItem(wk,it.id); },240); }
    else card.style.transform = 'translateX(0)';
  });

  /* drag handle */
  if(!it.done){
    var dh = wrap.querySelector('.dh');
    dh.addEventListener('touchstart', function(e){ e.stopPropagation(); if(lpt){clearTimeout(lpt);lpt=null;} DRAG.start(wrap, e.touches[0].clientY); }, {passive:true});
    dh.addEventListener('mousedown',  function(e){ e.stopPropagation(); DRAG.start(wrap, e.clientY); });
  }
  return wrap;
}

/* ════════════════════════════════
   DRAG — visual only during drag, single DOM reorder at drop
════════════════════════════════ */
var DRAG = {
  el: null, startY: 0, curY: 0, active: false, snap: [],

  getItems: function(){ return [].slice.call(document.querySelectorAll('#list .iw:not(.done-wrap)')); },

  start: function(el, y){
    var items = this.getItems();
    this.el = el;
    this.startY = y; this.curY = y;
    this.active = true;
    this.snap = items.slice(); // freeze order
    el.classList.add('dragging');
    document.body.style.overflow = 'hidden';
  },

  move: function(y){
    if(!this.active || !this.el) return;
    this.curY = y;
    // Only move dragged element visually — nothing else touches DOM
    this.el.style.transform = 'translateY(' + (y - this.startY) + 'px)';
    // Highlight target slot
    var t = this.targetIdx();
    this.snap.forEach(function(item, i){
      item.classList.toggle('drag-over', i === t && item !== DRAG.el);
    });
  },

  targetIdx: function(){
    var myIdx = this.snap.indexOf(this.el);
    var h = (this.el.offsetHeight || 52) + 7;
    var dy = this.curY - this.startY;
    // Require 60% of item height to move one slot (prevents over-jumping)
    var slots = dy >= 0
      ? Math.floor(dy / h + 0.4)
      : -Math.floor(-dy / h + 0.4);
    return Math.max(0, Math.min(this.snap.length - 1, myIdx + slots));
  },

  end: function(){
    if(!this.active || !this.el) return;
    this.active = false;
    var t = this.targetIdx();
    var myIdx = this.snap.indexOf(this.el);

    // Reset visual
    this.el.style.transform = '';
    this.el.classList.remove('dragging');
    this.snap.forEach(function(item){ item.classList.remove('drag-over'); });
    document.body.style.overflow = '';

    if(t !== myIdx){
      // Build new order array
      var newOrder = this.snap.slice();
      newOrder.splice(myIdx, 1);
      newOrder.splice(t, 0, this.el);
      // Insert into DOM in new order (single pass, before divider)
      var list = document.getElementById('list');
      var div = list.querySelector('.done-divider');
      newOrder.forEach(function(item){ list.insertBefore(item, div || null); });
      // Save sortOrder
      var wk = CW;
      newOrder.forEach(function(w, i){
        var id = w.dataset.id;
        if(DATA.items[wk] && DATA.items[wk][id]) DATA.items[wk][id].so = i * 1000;
      });
      pushData();
    }
    this.el = null; this.snap = [];
  }
};
document.addEventListener('touchmove', function(e){ if(DRAG.active){ e.preventDefault(); DRAG.move(e.touches[0].clientY); } }, {passive:false});
document.addEventListener('touchend',  function(){ if(DRAG.active) DRAG.end(); });
document.addEventListener('mousemove', function(e){ if(DRAG.active) DRAG.move(e.clientY); });
document.addEventListener('mouseup',   function(){ if(DRAG.active) DRAG.end(); });

/* ════════════════════════════════
   VOICE SHOPPING
════════════════════════════════ */
var SHOP = { on:false, items:[], idx:0, rec:null };

function shopStart(){
  var all = Object.values(DATA.items[CW]||{}).filter(function(i){ return !i.done; })
    .sort(function(a,b){ return (a.so||a.at)-(b.so||b.at); });
  if(!all.length){ showToast('אין פריטים ברשימה'); return; }
  SHOP.on=true; SHOP.items=all; SHOP.idx=0;
  document.getElementById('shop-bar').style.display = 'flex';
  shopReadCurrent();
}

function shopReadCurrent(){
  if(!SHOP.on) return;
  if(SHOP.idx >= SHOP.items.length){
    document.getElementById('shop-name').textContent = '✅ סיימנו!';
    document.getElementById('shop-hint').textContent = '';
    shopSpeak('סיימנו, כל הכבוד!', function(){ shopStop(); });
    return;
  }
  var it = SHOP.items[SHOP.idx];
  var lbl = it.name + (it.qty>1 ? ' ×'+it.qty : '');
  document.getElementById('shop-name').textContent = lbl;
  document.getElementById('shop-hint').textContent = '🔊 מקריא...';
  shopSpeak(it.name + (it.qty>1 ? ', כמות '+it.qty : ''), function(){
    if(!SHOP.on) return;
    document.getElementById('shop-hint').textContent = '🎙️ לחץ לקחתי / דלג, או דבר';
    shopListen();
  });
}

function shopSpeak(txt, cb){
  if(!window.speechSynthesis){ if(cb) cb(); return; }
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(txt);
  u.lang = 'he-IL'; u.rate = 0.88;
  var voices = speechSynthesis.getVoices();
  var hv = voices.filter(function(v){ return v.lang.startsWith('he'); })[0];
  if(hv) u.voice = hv;
  u.onend = cb || function(){};
  u.onerror = cb || function(){};
  speechSynthesis.speak(u);
}

function shopListen(){
  if(!SHOP.on) return;
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ document.getElementById('shop-hint').textContent = '👆 השתמש בכפתורים'; return; }
  if(SHOP.rec){ try{ SHOP.rec.abort(); }catch(e){} SHOP.rec=null; }
  var r = new SR(); SHOP.rec = r;
  r.lang = 'he-IL'; r.interimResults = false; r.maxAlternatives = 3;
  r.onresult = function(e){
    var txt = [].map.call(e.results[0], function(x){ return x.transcript; }).join(' ');
    document.getElementById('shop-hint').textContent = '💬 '+txt;
    if(/לקח|כן|יש|אוק|בסד|יאל|טוב|אישור/.test(txt)){
      shopTake();
    } else if(/דלג|הבא|לא|אין|skip/.test(txt)){
      shopSkip();
    } else {
      // didn't understand — wait for button or try again once
      document.getElementById('shop-hint').textContent = '🎙️ לחץ לקחתי / דלג';
      setTimeout(function(){ if(SHOP.on) shopListen(); }, 1000);
    }
  };
  r.onerror = function(e){
    if(!SHOP.on) return;
    document.getElementById('shop-hint').textContent = '🎙️ לחץ לקחתי / דלג';
    // silently retry on no-speech
    if(e.error==='no-speech'){ setTimeout(function(){ if(SHOP.on) shopListen(); }, 500); }
  };
  r.onend = function(){
    // if still waiting, restart listener
    if(SHOP.on && !SHOP.rec) return;
    SHOP.rec = null;
  };
  try{ r.start(); }catch(e){ document.getElementById('shop-hint').textContent = '👆 השתמש בכפתורים'; }
}

function shopTake(){
  if(!SHOP.on || SHOP.idx >= SHOP.items.length) return;
  if(SHOP.rec){ try{ SHOP.rec.abort(); }catch(e){} SHOP.rec=null; }
  toggleDone(CW, SHOP.items[SHOP.idx].id);
  SHOP.idx++;
  shopReadCurrent();
}
function shopSkip(){
  if(!SHOP.on) return;
  if(SHOP.rec){ try{ SHOP.rec.abort(); }catch(e){} SHOP.rec=null; }
  SHOP.idx++;
  shopReadCurrent();
}
function shopStop(){
  SHOP.on = false;
  if(window.speechSynthesis) speechSynthesis.cancel();
  if(SHOP.rec){ try{ SHOP.rec.abort(); }catch(e){} SHOP.rec=null; }
  document.getElementById('shop-bar').style.display = 'none';
}

/* ════════════════════════════════
   SUGGESTIONS & STATS
════════════════════════════════ */
function checkSugg(){
  var cur = Object.values(DATA.items[CW]||{}).map(function(i){ return i.name.toLowerCase(); });
  var now = Date.now(); var s = [];
  Object.entries(DATA.stats).forEach(function(e){
    var name=e[0], st=e[1];
    if(st.count<2 || cur.indexOf(name)>=0) return;
    var avg = st.weeks.length>1 ? (st.weeks.length-1)/(st.count-1) : 3;
    var days = (now-(st.last||0))/86400000;
    if(days >= avg*7*0.8) s.push({name:name, days:Math.round(avg*7)});
  });
  var c = document.getElementById('suggestions');
  if(!s.length){ c.innerHTML=''; return; }
  c.innerHTML = '<div class="sugg-title">🤖 הסל הזכור:</div>' +
    s.slice(0,5).map(function(x){
      return '<div class="sugg-chip" onclick="addItem(\''+x.name+'\',null,1);showToast(\'✅ נוסף!\')"><span>'+x.name+'</span><small style="color:var(--t2)"> ~כל '+x.days+' יום</small><span class="sugg-plus">+</span></div>';
    }).join('');
}

function renderStats(){
  var c = document.getElementById('stats-content');
  var e = Object.entries(DATA.stats).filter(function(x){ return x[1].count>=1; })
    .map(function(x){
      var s=x[1];
      return {n:x[0], c:s.count, a:s.weeks.length>1?Math.round((s.weeks.length-1)/(s.count-1)*7):'?'};
    }).sort(function(a,b){return b.c-a.c;}).slice(0,20);
  if(!e.length){ c.innerHTML='<p style="color:var(--t2);padding:18px 0">עדיין אין נתונים 📊</p>'; return; }
  c.innerHTML = '<div class="stat-hdr"><span>מוצר</span><span>ממוצע</span><span>פעמים</span></div>' +
    e.map(function(x){
      return '<div class="stat-row"><span class="sn">'+x.n+'</span><span class="sa">'+(x.a==='?'?'—':'~'+x.a+' יום')+'</span><span class="sc">'+x.c+'×</span></div>';
    }).join('');
}

/* ════════════════════════════════
   COMPARE
════════════════════════════════ */
function doCompare(){
  var w1=+document.getElementById('w1').value, p1=+document.getElementById('p1').value;
  var w2=+document.getElementById('w2').value, p2=+document.getElementById('p2').value;
  if(!w1||!p1||!w2||!p2){ showToast('⚠️ מלא את כל השדות'); return; }
  var u1=p1/w1, u2=p2/w2, r=document.getElementById('cmp-result');
  if(u1<u2){ var pct=(((u2-u1)/u2)*100).toFixed(1); r.innerHTML='<div class="cmp-win">🏆 מוצר א׳ זול ב-<strong>'+pct+'%</strong></div><div class="cmp-det">₪'+u1.toFixed(3)+' ליח׳ לעומת ₪'+u2.toFixed(3)+' ליח׳</div>'; }
  else if(u2<u1){ var pct=(((u1-u2)/u1)*100).toFixed(1); r.innerHTML='<div class="cmp-win">🏆 מוצר ב׳ זול ב-<strong>'+pct+'%</strong></div><div class="cmp-det">₪'+u2.toFixed(3)+' ליח׳ לעומת ₪'+u1.toFixed(3)+' ליח׳</div>'; }
  else r.innerHTML='<div class="cmp-win">🤝 זהים!</div>';
}

function closeSheet(){ document.getElementById('img-sheet').classList.remove('open'); }
function toggleSearch(){
  var a = document.getElementById('search-area');
  a.style.display = a.style.display==='none' ? 'block' : 'none';
}

function onFileChosen(e){
  var f = e.target.files[0]; if(!f) return;
  e.target.value = '';
  var r = new FileReader();
  r.onload = function(ev){ setImg(ev.target.result); closeSheet(); showToast('✅ תמונה נבחרה!'); };
  r.readAsDataURL(f);
}

var _selUrl = null;

async function runSearch(){
  var q = document.getElementById('search-q').value.trim();
  if(!q){ showToast('הקלד שם מוצר'); return; }
  var grid = document.getElementById('img-grid');
  grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--t2);padding:16px">מחפש מוצרים...</div>';
  document.getElementById('pick-btn').style.display = 'none';
  _selUrl = null;

  try {
    // Open Food Facts — free, no key, has real product images including Israeli products
    var url = 'https://world.openfoodfacts.org/cgi/search.pl?search_terms='
      + encodeURIComponent(q)
      + '&search_simple=1&action=process&json=1&page_size=20&fields=product_name,image_front_small_url,image_front_url,brands';

    var resp = await fetch(url);
    var data = await resp.json();
    var products = (data.products || []).filter(function(p){
      return p.image_front_small_url || p.image_front_url;
    }).slice(0, 9);

    if(!products.length){
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--t2);padding:16px">לא נמצאו מוצרים — נסה באנגלית</div>';
      return;
    }

    grid.innerHTML = '';
    products.forEach(function(p){
      var thumb = p.image_front_small_url || p.image_front_url;
      var full  = p.image_front_url || thumb;
      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'position:relative;cursor:pointer;border-radius:8px;overflow:hidden;border:2px solid transparent;aspect-ratio:1;background:var(--s2)';
      var img = document.createElement('img');
      img.src = thumb;
      img.style.cssText = 'width:100%;height:100%;object-fit:contain;';
      img.onerror = function(){ wrapper.remove(); };
      var label = document.createElement('div');
      label.style.cssText = 'position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);color:#fff;font-size:.58rem;padding:2px 4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis';
      label.textContent = p.product_name || p.brands || '';
      wrapper.appendChild(img);
      wrapper.appendChild(label);
      wrapper.onclick = function(){
        grid.querySelectorAll('div[style*="solid"]').forEach(function(x){
          x.style.borderColor = 'transparent';
        });
        wrapper.style.borderColor = 'var(--g)';
        _selUrl = full;
        document.getElementById('pick-btn').style.display = 'block';
      };
      grid.appendChild(wrapper);
    });
  } catch(e) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--t2);padding:16px">שגיאה בחיפוש — בדוק חיבור לאינטרנט</div>';
  }
}

function pickImg(){
  if(!_selUrl) return;
  setImg(_selUrl);
  closeSheet();
  showToast('✅ תמונה נבחרה!');
}

function pickSearchImg(){
  pickImg();
}
function showBigImg(src){ document.getElementById('big-img').src=src; document.getElementById('big-img-modal').classList.add('open'); }

/* ════════════════════════════════
   COPY BASKET
════════════════════════════════ */
function populateCopySelect(){
  var nd = new Date(); nd.setDate(nd.getDate()+7);
  var all = Object.keys(DATA.items).concat([weekKey(), weekKey(nd)]);
  var seen={}; var uniq=[];
  all.forEach(function(k){ if(!seen[k]&&k!==CW){seen[k]=1;uniq.push(k);} });
  uniq.sort().reverse();
  var sel = document.getElementById('copy-to-wk');
  sel.innerHTML = '';
  uniq.forEach(function(k){
    var o=document.createElement('option'); o.value=k; o.textContent=weekLabel(k); sel.appendChild(o);
  });
}
function copyBasket(){
  var toWk = document.getElementById('copy-to-wk').value;
  if(!toWk){ showToast('בחר שבוע יעד'); return; }
  var src = Object.values(DATA.items[CW]||{}).filter(function(i){ return !i.done; });
  if(!src.length){ showToast('אין פריטים להעתקה'); return; }
  if(!DATA.items[toWk]) DATA.items[toWk]={};
  src.forEach(function(it){
    var nid=uid();
    DATA.items[toWk][nid]={ id:nid, name:it.name, qty:it.qty, done:false, price:null, image:it.image, at:Date.now(), so:maxOrder(toWk)+1000, auto:false };
  });
  pushData();
  showToast('📋 ' + src.length + ' פריטים הועתקו!');
}

/* ════════════════════════════════
   MONTHLY VIEW
════════════════════════════════ */
var _monthOffset = 0;
function getMonthWeeks(offset){
  var now = new Date();
  var year = now.getFullYear();
  var month = now.getMonth() + offset;
  // normalize month
  while(month < 0){ month+=12; year--; }
  while(month > 11){ month-=12; year++; }
  var first = new Date(year, month, 1);
  var last  = new Date(year, month+1, 0);
  var weeks = [];
  var d = new Date(first); d.setDate(d.getDate()-d.getDay());
  while(d <= last){
    weeks.push(weekKey(new Date(d)));
    d.setDate(d.getDate()+7);
  }
  return { weeks:weeks, label: ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'][month]+' '+year };
}
function renderMonthView(){
  var info = getMonthWeeks(_monthOffset);
  document.getElementById('month-label').textContent = info.label;
  var html2 = '';
  info.weeks.forEach(function(wk){
    var items = Object.values(DATA.items[wk]||{});
    if(!items.length) return;
    var done = items.filter(function(i){return i.done;}).length;
    html2 += '<div class="month-week" onclick="switchWeek(this.dataset.wk);showTab(\'list\')" data-wk="'+wk+'" style="background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:10px 12px;margin-bottom:8px;cursor:pointer">';
    html2 += '<div style="font-size:.78rem;color:var(--t2);margin-bottom:5px">'+weekLabel(wk)+'</div>';
    html2 += '<div style="display:flex;flex-wrap:wrap;gap:5px">';
    items.slice(0,8).forEach(function(it){
      html2 += '<span style="background:'+(it.done?'rgba(74,222,128,.15)':'var(--s)')+';border:1px solid var(--bd);border-radius:8px;padding:2px 8px;font-size:.75rem'+(it.done?';color:var(--t2);text-decoration:line-through':'')+'">' + it.name + '</span>';
    });
    if(items.length > 8) html2 += '<span style="color:var(--t2);font-size:.72rem">+' + (items.length-8) + ' עוד</span>';
    html2 += '</div>';
    html2 += '<div style="font-size:.7rem;color:var(--t2);margin-top:5px">'+done+'/'+items.length+' נלקחו</div>';
    html2 += '</div>';
  });
  if(!html2) html2 = '<p style="color:var(--t2);font-size:.82rem">אין נתונים לחודש זה</p>';
  document.getElementById('month-view').innerHTML = html2;
}
function prevMonth(){ _monthOffset--; renderMonthView(); }
function nextMonth(){ _monthOffset++; renderMonthView(); }

/* ════════════════════════════════
   CLEAR STATS
════════════════════════════════ */
function clearStats(){
  if(!confirm('למחוק את כל הסטטיסטיקה?')) return;
  DATA.stats = {};
  pushData();
  document.getElementById('suggestions').innerHTML = '';
  showToast('🗑 סטטיסטיקה נמחקה');
}

/* ════════════════════════════════
   TOAST
════════════════════════════════ */
var _toastTimer = null;
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ t.className=''; }, 2500);
}
</script>
